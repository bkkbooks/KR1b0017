body:
  text: 書經集傳卷五宋蔡沈撰召誥左傳曰武王克商遷九鼎于洛邑史記載武王言我南望三途北望嶽鄙顧瞻有河粵瞻洛伊毋逺天室營周居于洛邑而後去則宅洛者武王之志周公成王成之召公實先經理之洛邑既成成王始政召公因周公之歸作書致告逹之於王其書拳拳於歷年之久近反復乎夏商之廢興究其歸則以諴小民為祈天命之本以疾敬德為諴小民之本一篇之中屢致意焉古之大臣其為國家長逺慮蓋如此以召公之書因以召誥名篇今文古文皆有惟二月既望越六日乙未王朝步自周則至于豐日月相望謂之望既望十六日也乙未二十一日也周鎬京也去豐二十五里文王廟在焉成王至豐以宅洛之事告廟也惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營朏敷尾反戊音茂成王在豐使召公先周公行相視洛邑越若來古語辭言召公於豐迤邐而來也朏孟康曰月出也三日明生之名戊申三月五日也卜宅者用龜卜宅都之地既得吉卜則經營規度其城郭宗廟郊社朝市之位越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成庶殷殷之衆庶也用庶殷者意是時殷民已遷于洛故就役之也位成者左祖右社前朝後市之位成也若翼日乙卯周公朝至于洛則達觀于新邑營周公至則遍觀新邑所經營之位越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一郊祭天地也故用二牛社祭用太牢禮也皆告以營洛之事越七日甲子周公乃朝用書命庶殷侯甸男邦伯書役書也春秋傳曰士彌牟營成周計丈數揣髙低度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書糇糧以令役於諸侯亦此意王氏曰邦伯者侯甸男服之邦伯也庶邦冡君咸在而獨命邦伯者公以書命邦伯而邦伯以公命命諸侯也厥既命殷庶庶殷丕作丕作者言皆趨事赴功也殷之頑民若未易役使者然召公率以攻位而位成周公用以書命而丕作殷民之難化者猶且如此則其恱以使民可知也太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事呂氏曰洛邑事畢周公將歸宗周召公因陳戒成王乃取諸侯贄見幣物以與周公且言其拜手稽首所以陳王及公之意蓋召公雖與周公言乃欲周公聨諸侯之幣與召公之誥併達之王謂洛邑已定欲誥告殷民其根本乃自爾御事不敢指言成王謂之御事猶今稱人為執事也嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬此下皆告成王之辭託周公逹之王也曷何也其語辭商受嗣天位為元子矣元子不可改而天改之大國未易亡而天亡之皇天上帝其命之不可恃如此今王受命固有無窮之美然亦有無窮之憂於是歎息言王曷其奈何弗敬乎蓋深言不可以弗敬也又按此篇専主敬言敬則誠實無妄視聽言動一循乎理好惡用捨不違乎天與天同德固能受天明命也人君保有天命其有要於此哉伊尹亦言皇天無親克敬惟親敬則天與我一矣尚何疏之有天既遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終智藏瘝在夫知保抱攜持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀于四方民其眷命用懋王其疾敬德後王後民指受也此章語多難解大意謂天既欲逺絶大邦殷之命矣而此殷先哲王其精爽在天宜若可恃者而商紂受命卒致賢智者退藏病民者在位民困虐政保抱攜持其妻子哀號呼天往而逃亡出見拘執無地自容故天亦哀民而眷命用歸於勉德者天命不常如此今王其可不疾敬德乎相古先民有夏天迪從子保面稽天若今時既墜厥命今相有殷天迪格保面稽天若今時既墜厥命從子保者從其子而保之謂禹傳之子也面鄉也視古先民有夏天固啓迪之又從其子而保佑之禹亦面考天心敬順無違宜若可為後世憑藉者今時已墜厥命矣今視有殷天固啓迪之又使其格正夏命而保佑之湯亦面考天心敬順無違宜亦可為後世憑藉者今時已墜厥命矣以此知天命誠不可恃以為安也今沖子嗣則無遺壽耇曰其稽我古人之德矧曰其有能稽謀自天稽考矧况也幼沖之主於老成之臣尤易疏逺故召公言今王以童子嗣位不可遺棄老成言其能稽古人之德是固不可遺也况言其能稽謀自天是尤不可遺也稽古人之德則於事有所證稽謀自天則於理無所遺無遺壽耇蓋君天下者之要務故召公特首言之嗚呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞召公歎息言王雖幼沖乃天之元子哉謂其年雖小其任則大也其者期之辭也諴和碞險也王其大能諴和小民為今之休美乎小民雖至微而至為可畏王當不敢緩於敬德用顧畏于民之碞險可也王來紹上帝自服于土中旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休洛邑天地之中故謂之土中王來洛邑繼天出治當自服行于土中是時洛邑告成成王始政故召公以自服土中為言又舉周公嘗言作此大邑自是可以對越上天可以饗答神祇自是可以宅中圖治成命者天之成命也成王而能紹上帝服土中則庶幾天有成命治民今即休美矣王氏曰成王欲宅洛邑者以天事言則日東景夕多風日西景朝多隂日南景短多暑日北景長多寒洛天地之中風雨之所㑹隂陽之所和也以人事言則四方朝聘貢賦道里均焉故謂之土中王先服殷御事比介于我有周御事節性惟日其邁言治人當先服乎臣也王先服殷之御事以親近副二我周之御事使其漸染陶成相觀為善以節其驕淫之性則日進於善而不已矣王敬作所不可不敬德言化臣必謹乎身也所處所也猶所其無逸之所王能以敬為所則動靜語默出入起居無往而不居敬矣不可不敬德者甚言德之不可不敬也我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歷年我不敢知曰不其延惟不敬厥德乃早墜厥命夏商歷年長短所不敢知我所知者惟不敬厥德即墜其命也與上章相古先民之意相為出入但上章主言天眷之不足恃此則直言不敬德則墜厥命爾今王嗣受厥命我亦惟兹二國命嗣若功王乃初服今王繼受天命我謂亦惟此夏商之命當嗣其有功者謂繼其能敬德而歷年者也况王乃新邑初政服行教化之始乎嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歷年知今我初服歎息言王之初服若生子無不在於初生習為善則善矣自貽其哲命為政之道亦猶是也今天其命王以哲乎命以吉凶乎命以歷年乎皆不可知所可知者今我初服如何爾初服而敬德則亦自貽哲命而吉與歷年矣宅新邑肆惟王其疾敬德王其德之用祈天永命宅新邑所謂初服也王其疾敬德容可緩乎王其德之用而祈天以歷年也其惟王勿以小民淫用非彝亦敢殄戮用乂民若有功刑者德之反疾於敬德則當緩於用刑勿以小民過用非法之故亦敢於殄戮用治之也惟順導民則可有功民猶水也水泛濫橫流失其性矣然壅而遏之則害愈甚惟順而導之則可以成功其惟王位在德元小民乃惟刑用于天下越王顯元首也居天下之上必有首天下之德王位在德元則小民皆儀刑用德于下於王之德益以顯矣上下勤恤其曰我受天命丕若有夏歷年式勿替有殷歷年欲王以小民受天永命其亦期之辭也君臣勤勞期曰我受天命大如有夏歷年用勿替有殷歷年欲兼夏殷歷年之永也召公又繼以欲王以小民受天永命蓋以小民者勤恤之實受天永命者歷年之實也蘇氏曰君臣一心以勤恤民庶幾王受命歷年如夏商且以民心為天命也拜手稽首曰豫小臣敢以王之讎民百君子越友民保受王威命明德王末有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命讎民殷之頑民與三監叛者百君子殷之御事庶士也友民周之友順民也保者保而不失受者受而無拒威命明德者德威德明也末終也召公於篇終致敬言豫小臣敢以殷周臣民保受王威命明德王當終有天之成命以顯于後世我非敢以此為勤惟恭奉幣帛用供王能祈天永命而已蓋奉幣之禮臣職之所當恭而祈天之實則在王之所自盡也又按恭奉幣意即上文取幣以錫周公而旅王者蓋當時成王將舉新邑之祀故召公奉以助祭云洛誥洛邑既定周公遣使告卜史氏録之以為洛誥又并記其君臣答問及成王命周公留治洛之事今文古文皆有按周公拜手稽首以下周公授使者告卜之辭也王拜手稽首以下成王授使者復公之辭也王肇稱殷禮以下周公教成王宅洛之事也公明保豫沖子以下成王命公留後治洛之事也王命豫來以下周公許成王留洛君臣各盡其責難之辭也伻來以下成王錫命毖殷命寧之事也戊辰以下史又記其祭祀冊誥等事及周公居洛歲月久近以附之以見周公作洛之始終而成王舉祀發政之後即歸于周而未嘗都洛也周公拜手稽首曰朕復子明辟此下周公授使者告卜之辭也拜手稽首者史記周公遣使之禮也復如逆復之復成王命周公往營成周周公得卜復命于王也謂成王為子者親之也謂成王為明辟者尊之也周公相成王尊則君親則兄之子也明辟者明君之謂先儒謂成王幼周公代王為辟至是反政成王故曰復子明辟夫有失然後有復武王崩成王立未嘗一日不居君位何復之有哉蔡仲之命言周公住冢宰正百工則周公以冢宰總百工而己豈不彰彰明甚矣乎王莽居攝幾傾漢鼎皆儒者有以啓之是不可以不辨蘇氏曰此上有脫簡在康誥自惟三月哉生魄至洪大誥治四十八字王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟凡有造基之而後成成之而後定基命所以成始也定命所以成終也言成王幼沖退託如不敢及知天之基命定命豫乃繼太保而往夫相洛邑其庶幾為王始作民明辟之地也洛邑在鎬京東故曰東土豫惟乙卯朝至于洛師我卜河朔黎水我乃卜㵎水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜瀍音廛伻補耕反乙卯即召誥之乙卯也洛師猶言京師也河朔黎水河北黎水交流之內也㵎水車瀍水西王城也朝㑹之地瀍水東下都也處商民之地王城在㵎瀍之閒下都在瀍水之外其地皆近洛水故兩云惟洛食也食者史先定墨而灼龜之兆正食其墨也伻使也圖洛之地圖也獻卜獻其卜之兆辭也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言此王授使者復公之辭也王拜手稽首者成王尊異周公而重其禮也匹配也公不敢不敬天之休命來相宅為周匹休之地言卜洛以配周命於無窮也視示也示我以卜之休美而常吉者也二人成王周公也貞猶當也十萬曰億言周公宅洛規模宏逺以我萬億年敬天休命故又拜手稽首以謝周公告卜之誨言周公曰王肇稱殷禮祀于新邑咸秩無文此下周公告成王宅洛之事也殷盛也與五年再殷祭之殷同秩序也無文祀典不載也言王始舉盛禮祀于洛邑皆序其所當祭者雖祀典不載而義當祀者亦序而祭之也呂氏曰定都之初肇舉盛禮大饗羣祀雖祀典不載者咸秩序而祭之有告焉有報焉有祈焉始建新都昭假上下告成事也雨暘時若大役以成報神賜也自今以始永奠中土祈鴻休也後世不知祭祀之義鬼神之德觀周公首以祀于新邑為言若闊於事情者抑不知人主臨鎮新都之始齊祓一心對越天地逹此精明之德放諸四海無所不凖而助祭諸侯下逮胞翟之賤亦皆有孚顒若收其放而合其離蓋格君心萃天下之道莫要於此宜周公以為首務也豫齊百工伻從玉于周豫惟曰庶有事周公言豫整齊百官使從成王于周謂將適洛時也豫惟謂之曰庶幾其有所事乎公但微示其意以待成王自教詔之也今王即命曰記功宗以功作元祀惟命曰汝受命篤弼功宗功之尊顯者祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之蓋功臣皆祭於大蒸而勳勞之最尊顯者則為之冠故謂之元祀周公告成王即命曰記功之尊顯者以功作元祀矣又惟命之曰汝功臣受此褒賞之命當益厚輔王室蓋作元祀既以慰答功臣而又勉其左右王室益圖久大之業也丕視功載乃汝其悉自教工丕大視示也功載者記功之載籍也大視功載而無不公則百工效之亦皆公也大視功載而或出於私則百工效之亦皆私也其公其私悉自汝教之所謂乃汝其悉自教工也上章告以褒賞功臣故戒其大視功載者如此孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶孺子稚子也朋比也上文百工之視效如此則論功行賞孺子其可少徇比黨之私乎孺子其少徇比黨之私則自是而往有若火然始雖焰焰尚微而其灼爍將次第延爇不可得而撲滅矣言論功行賞徇私之害其初甚微其終至於不可遏絶所以嚴其辭而禁之於未然也厥若彝及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭其順常道及撫國事常如我為政之時惟用見在周官勿參以私人往新邑使百工知上意嚮各就有僚明白奮揚而赴功惇厚博大以裕俗則王之休聞亦永有辭于後世矣公曰已汝惟沖子惟終周之王業文武始之成王當終之也此上詳於記功教工內治之事此下則統御諸侯教養萬民之道也汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮此御諸侯之道也百辟諸侯也享朝享也儀禮物幣也諸侯享上有誠有僞惟人君克敬者能識之識其誠於享者亦識其不誠於享者享不在幣而在於禮幣有餘而禮不足亦所謂不享也諸侯惟不用志于享則國人化之亦皆謂上不必享矣舉國無享上之誠則政事安得不至於差爽僭侮隳王度而為叛亂哉人君可不以敬存心辨之於早察之於微乎乃惟孺子頒朕不暇聽朕教汝于棐民彝汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無遠用戾蘉莫郎反此教養萬民之道也頒朕不暇未詳或曰成王當頒布我汲汲不暇者聽我教汝所以輔民常性之道汝於是而不勉焉則民彝泯亂而非所以長久之道矣正父武王也猶今稱先正云者篤者篤厚而不忘敘者先後之不紊言篤敘武王之道無不如我則人不敢廢汝之命矣呂氏曰武王沒周公如武王故天下不廢周公之命周公去成王如周公則天下不廢成王之命戾至也王往洛邑其敬之哉我其退休田野惟明農事蓋公有歸老之志矣彼謂洛邑也王於洛邑和裕其民則民將無遠而至焉王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師此下成王答周公及留公也大抵與上章參錯相應明顯明之也保保佑之也稱舉也和者使不乖也恆者使可久也居師者宅其衆也言周公明保成王舉大明德使其上之不忝於文武仰不愧天俯不怍人也惇宗將禮稱秩元祀咸秩無文宗功宗之宗也下文宗禮同將大也惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀旁無方所也因上下四方為言穆穆和敬也迓迎也言周公之德昭著於上下勤施於四方旁作穆穆以迎治平不迷失文武所勤之教於天下公之德教加於時者如此豫沖子夫何為哉惟早夜以謹祭祀而已蓋成王知周公有退休之志故示其所以留之之意也王曰公功棐迪篤罔不若時言周公之功所以輔我啓我者厚矣當常如是未可以言去也王曰公豫小子其退即辟于周命公後此下成王留周公治洛也成王言我退即居于周命公留後治洛蓋洛邑之作周公本欲成王遷都以宅天下之中而成王之意則未欲捨鎬京而廢祖宗之舊故於洛邑舉祀發政之後即欲歸居于周而留周公治洛謂之後者先成王之辭猶後世留守留後之義先儒謂封伯禽以為魯後者非是考之費誓東郊不開乃在周公東征之時則伯禽就國蓋已久矣下文惟告周公其後其字之義益可見其為周公不為伯禽也四方迪亂未定于宗禮亦未克敉公功宗禮即功宗之禮也亂治也四方開治公之功也未定功宗之禮故未能敉公功也敉功者安定其功之謂即下文命寧者也迪將其後監我士師工誕保文武受民亂為四輔將大也周公居洛啓大其後使我士師工有所監視大保文武所受於天之民而治為宗周之四輔也漢三輔蓋本諸此今按先言啓大其後而繼以亂為四輔則命周公留後於洛明矣王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享斁音亦定爾雅曰止也成王欲周公止洛而自歸往宗周言周公之功人皆肅而將之欽而悅之宜鎮撫洛邑以慰懌人心毋求去以困我也我惟無厭其安民之事公勿替所以監我士師工者四方得以世世享公之德也吳氏曰前漢書兩引公無困哉皆以哉作我當以我為正周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭此下周公許成王留等事也來者來洛邑也承保乃文祖受命民及光烈考武王者答誕保文武受民之言也責難於君謂之恭𢎞朕恭者大其責難之義也孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績典典章也殷獻民殷之賢者也言當大厚其典章及殷之獻民蓋文獻者為治之大要也亂治也言成王於新邑致治為四方新主也作周恭先者人君恭以接下以恭而倡後王也公又言其自是宅中圖治萬邦咸底休美則王其有成績矣此周公以治洛之效望之成王也豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德多子者衆卿大夫也唐孔氏曰子者有德之稱大夫皆稱子師衆也周公言我以衆卿大夫及治事之臣篤厚文武成功以答天下之衆也孚信也作周孚先者人臣信以事上以信而倡後人也考成也昭子猶所謂明辟也親之故曰子刑儀刑也單殫也言成我明子儀刑而殫盡文王之德蓋周公與羣臣篤前人成烈者所以成成王之刑乃殫文祖德也此周公以治洛之事自效也伻來毖殷乃命寧豫絶句以秬鬯二卣曰明禋拜手稽首休享秬臼許反鬯丑亮反卣音由禋音因此謹毖殷民而命寧周公也秬黑黍也一稃二米和氣所生鬯鬱金香草也卣中尊也明潔禋敬也以事神之禮事公也蘇氏曰以黑黍為酒合以鬱鬯所以祼也宗廟之禮莫盛於祼王使人來戒敕庶殷且以秬鬯二卣綏寧周公曰明禋曰休享者何也事周公如事神明也古者有大賔客以享禮禮之酒清人渴而不飲肉乾人饑而不食也故享有體薦豈非敬之至者則其禮如祭也歟豫不敢宿則禋于文王武王宿與顧命三宿之宿同禋祭名周公不敢受此禮而祭於文武也惠篤敘無有遘自疾萬年厭于乃德殷乃引考遘居候反厭於艷反此祭之祝辭周公為成王禱也惠順也篤敘與篤敘乃正父同順篤敘文武之道身其康强無有遘遇自罹疾害者子孫萬年厭飽乃德殷人亦永壽考也王伻殷乃承敘萬年其永觀朕子懷德承聽受也敘教條次第也王使殷人承敘萬年其永觀法我孺子而懷其德也蓋周公雖許成王留洛然且謂王伻殷者若曰遷洛之民我固任之至於使其承敘萬年則實繫于王也亦責難之意與召誥末用供王能祈天永命語脉相類戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賔殺禋咸格王入太室祼戊音茂祼古玩反此下史官記祭祀冊誥等事以附篇末也戊辰十二月之戊辰日也是日成王在洛舉蒸祭之禮曰歲云者歲舉之祭也周尚赤故用騂宗廟禮太牢此用特牛者命周公留後於洛故舉盛禮也逸史佚也作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也王賔猶虞賔杞宋之屬助祭諸侯也諸侯以王殺牲禋祭祖廟故咸至也太室清廟中央室也祼灌也以圭瓚酌秬鬯灌地以降神也王命周公後作冊逸誥在十有二月逸誥者史逸誥周公治洛留後也在十有二月者明戊辰為十二月日也惟周公誕保文武受命惟七年吳氏曰周公自留洛之後凡七年而薨也成王之留公也言誕保文武受民公之復成王也亦言承保乃文祖受命民越乃光烈考武王故史臣於其終計其年曰惟周公誕保文武受命惟七年蓋始終公之辭云多士商民遷洛者亦有有位之士故周公洛邑初政以王命總呼多士而告之編書者因以名篇亦誥體也今文古文皆有吳氏曰方遷商民于洛之時成周未作其後王與周公患四方之逺鍳三監之叛於是始作洛邑欲徙周而居之其曰昔朕來自奄大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜者述遷民之初也曰今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜者言遷民而後作洛也故洛誥一篇終始皆無欲遷商民之意惟周公既誥成王留治于洛之後乃曰伻來毖殷又曰王伻殷乃承敘當時商民已遷于洛故其言如此愚謂武王已有都洛之志故周公黜殷之後以殷民反覆難制即遷干洛至是建成周造廬舍定疆場乃告命與之更始焉爾此多士之所以作也由是而推則召誥攻位之庶殷其已遷洛之民歟不然則受都今衛州也洛邑今西京也相去四百餘里召公安得舍近之友民而役逺之讎民哉書序以為成周既成遷殷頑民者謬矣吾固以為非孔子所作也惟三月周公初于新邑洛用告商王士此多士之本序也三月成王祀洛次年之三月也周公至洛久矣此言初者成王既不果遷留公治洛至是公始行治洛之事故謂之初也曰商王士者貴之也王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝弗弔未詳意其為歎憫之辭當時方言爾也旻天秋天也主肅殺而言歎憫言旻天大降災害而喪殷我周受眷佑之命奉將天之明威致王罰之公勑正殷命而革之以終上帝之事蓋推革命之公以開諭之也肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位肆與康誥肆汝小子封同弋取也弋鳥之弋言有心於取之也呼多士誥之謂以勢而言我小國亦豈敢弋取殷命蓋栽者培之傾者覆之固其治而不固其亂者天之道也惟天不與殷信其不固殷之亂矣惟天不固殷之亂故輔我周之治而天位自有所不容辭者我其敢有求位之心哉惟帝不畀惟我下民秉為惟天明畏秉持也言天命之所不與即民心之所秉為民心之所秉為即天威之所明畏者也反覆天民相因之理以見天之果不外乎民民之果不外乎天也詩言秉彝此言秉為者彝以理言為以用言也我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰引導逸安也降格與吕刑降格同呂氏曰上帝引逸者非有形聲之接也人心得其安則亹亹而不能已斯則上帝引之也是理坦然亦何閒于桀第桀喪其良心自不適於安耳帝實引之桀實避之帝猶未遽絶也乃降格災異以示意嚮於桀桀猶不知警懼不能敬用帝命乃大肆淫逸雖有矯誣之辭而天罔念聞之仲虺所謂帝用不臧是也廢其大命降致其罰而夏祚終矣乃命爾先祖成湯革夏俊民甸四方甸治也伊尹稱湯旁求俊彥孟子稱湯立賢無方蓋明揚俊民分布逺邇甸治區畫成湯立政之大經也周公反復以夏商為言者蓋夏之亡即殷之亡湯之興即武王之興也商民觀是亦可以自反矣自成湯至于帝乙罔不明德恤祀明德者所以修其身恤祀者所以敬乎神也亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤亦惟天大建立保治有殷殷之先王亦皆操存此心無敢失帝之則無不配天以澤民也在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祗後嗣王紂也紂大不明於天道况曰能聽念商先王之勤勞於邦家者乎大肆淫佚無復顧念天之顯道民之敬畏者也惟時上帝不保降若兹大喪大喪者國亡而身戮也惟天不畀不明厥德商先王以明德而天丕建則商後王不明德而天不畀矣凡四方小大邦喪罔非有辭于罰凡四方小大邦國喪亡其致罰皆有可言者况商罪貫盈而周奉辭以伐之者乎王若曰爾殷多士今惟我周王丕靈承帝事靈善也大善承天之所為也武成言祗承上帝以遏亂略是也有命曰割殷告勑于帝帝有命曰割殷則不得不戡定翦除告其勑正之事于帝也武成言告于皇天后土將有大正于商者是也惟我事不二適惟爾王家我適上帝臨汝毋二爾心惟我事不二適之謂上帝既命侯于周服惟爾王家我適之謂言割殷之事非有私心一於從帝而無二適則爾殷王家自不容不我適矣周不二於帝殷其能二於周乎蓋示以確然不可動搖之意而潛消頑民反側之情爾然聖賢事不二適日用飲食莫不皆然蓋所以事天也豈特割殷之事而已哉豫其曰惟爾洪無度我不爾動自乃邑三監倡亂豫其曰乃汝大為非法非我爾動變自爾邑猶伊訓所謂造攻自鳴條也豫亦念天即于殷大戾肆不正豫亦念天就殷邦屢降大戾紂既死武庚又死故邪慝不正言當遷徙也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨時是也指上文殷大戾而言謂惟是之故所以遷居西爾非我一人樂如是之遷徙震動也是惟天命如此汝毋違越我不敢有後命謂有他罰爾無我怨也惟爾知惟殷先人有冊有典殷革夏命即其舊聞以開諭之也殷之先世有冊書典籍載殷改夏命之事正如是耳爾何獨疑於今乎今爾又曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命周公既舉商革夏事以諭頑民頑民復以商革夏事責周謂商革夏命之初凡夏之士皆啓迪簡拔在商王之庭有服列于百僚之間今周於商士未聞有所簡拔也周公舉其言以大義折之言爾頑民雖有是言然豫一人所聽用者惟以德而已故豫敢求爾於天邑商而遷之於洛者以冀率德改行焉豫惟循商故事矜恤於爾而已其不爾用者非我之罪也是惟天命如此蓋章德者天之命今頑民滅德而欲求用得乎王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜降猶今法降等云者言昔我來自商奄之時汝四國之民罪皆應死我大降爾命不忍誅戮乃止明致天罰移爾逺居于洛以親比臣我宗周有多遜之美其罰蓋亦甚輕其恩固已甚厚今乃猶有所怨望乎詳此章則商民之遷固已久矣王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜以自奄之命為初命則此命為申命也言我惟不忍爾殺故申明此命且我所以營洛者以四方諸侯無所賔禮之地亦惟爾等服事奔走臣我多遜而無所處故也詳此章則遷民在營洛之先矣吳氏曰來自奄稱昔者逺日之辭也作大邑稱今者近日之辭也移爾遐逖比臣事我宗多遜者期之之辭也攸服奔走臣我多遜者果能之辭也以此又知遷民在前而作洛在後也爾乃尚有爾土爾乃尚寧幹止幹事止居也爾乃庶幾有爾田業庶幾安爾所事安爾所居也詳此章所言皆仍舊有土田居止之辭信商民之遷舊矣孔氏不得其說而以得反所生釋之於文義似矣而事則非也爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬敬則言動無不循理天之所福吉祥所集也不敬則言動莫不違悖天之所禍刑戮所加也豈特竄徙不有爾土而已哉身亦有所不能保矣今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷邑四井為邑之邑繼者承續安居之謂有營為有夀考皆于兹洛焉爾之子孫乃興自爾遷始也夫自亡國之末裔為起家之始祖頑民雖愚亦知所擇矣王曰又曰時豫乃或言爾攸居王曰之下當有闕文以多方篇末王曰又曰推之可見時我或有所言皆以爾之所居止為念也申結上文爾居之意無逸逸者人君之大戒自古有國家者未有不以勤而興以逸而廢也益戒舜曰罔遊于逸罔淫于樂舜大聖也益猶以是戒之則時君世主其可忽哉成王初政周公懼其知逸而不知無逸也故作是書以訓之言則古昔必稱商王者時之近也必稱先王者王之親也舉三宗者繼世之君也詳文祖者耳目之所逮也上自天命精微下至畎畝艱難閭里怨詛無不具載豈獨成王之所當知哉實天下萬世人主之龜鑑也是篇凡七更端周公皆以嗚呼發之深嗟永歎其意深逺矣亦訓體也今文古文皆有周公曰嗚呼君子所其無逸所猶處所也君子以無逸為所動靜食息無不在是焉作輟則非所謂所矣先知稼穡之艱難乃逸則知小人之依先知稼穡之艱難乃逸者以勤居逸也依者指稼穡而言小民所恃以為生者也農之依田猶魚之依水木之依土魚無水則死木無土則枯民非稼穡則無以生也故舜自耕稼以至為帝禹稷躬稼以有天下文武之基起於后稷四民之事莫勞於稼穡生民之功莫盛於稼穡周公發無逸之訓而首及乎此有以哉相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知諺疑戰反不知稼穡之艱難乃逸者以逸為逸也俚語曰諺言視小民其父母勤勞稼穡其子乃生於豢養不知稼穡之艱難乃縱逸自恣乃習俚巷鄙語既又誕妄無所不至不然則又訕侮其父母曰古老之人無聞無知徒自勞苦而不知所以自逸也昔劉裕奮農畝而取江左一再傳後子孫見其服用反笑曰田舍翁得此亦過矣此正所謂昔之人無聞知也使成王非周公之訓安知其不以公劉后稷為田舍翁也周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年中宗太戊也嚴則莊重恭則謙抑寅則欽肅畏則戒懼天命即天理也中宗嚴恭寅畏以天理而自檢律其身至於治民之際亦祗敬恐懼而不敢怠荒安寧中宗無逸之實如此故能有享國永年之效也按書序太戊有原命咸又等篇意述其當時敬天治民之事今無所考矣其在髙宗時舊勞于外爰暨小人作其即位乃或亮隂三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆高宗之享國五十有九年亮音梁隂音菴高宗武丁也未即位之時其父小乙使久居民間與小民出入同事故於小民稼穡艱難備嘗知之也雍和也發言和順當於理也嘉美靖安也嘉靖者禮樂教化蔚然於安居樂業之中也漢文帝與民休息謂之靖則可謂之嘉則不可小大無時或怨者萬民咸和也乃雍者和之發於身嘉靖者和之達於政無怨者和之著於民也餘見說命高宗無逸之實如此故亦有享國永年之效也其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年史記高宗崩子祖庚立祖庚崩弟祖甲立則祖甲高宗之子祖庚之弟也鄭𤣥曰高宗欲廢祖庚立祖甲祖甲以為不義逃於民間故云不義惟王按漢孔氏以祖甲為太甲蓋以國語稱帝甲亂之七世而殞孔氏見此等記載意為帝甲必非周公所稱者又以不義惟王與太甲茲乃不義文似遂以此稱祖甲者為太甲然詳此章舊為小人作其即位與上章爰暨小人作其即位文勢正類所謂小人者皆指微賤而言非謂憸小之人也作其即位亦不見太甲復政思庸之意又按邵子經世書高宗五十九年祖庚七年祖甲三十三年世次歷年皆與書合亦不以太甲為祖甲况殷世二十有九以甲名者五帝以太以小以沃以陽以祖别之不應二人俱稱祖甲國語傳訛承謬旁記曲說不足盡信要以周公之言為正又下文周公言自殷王中宗及高宗及祖甲及我周文王及云者因其先後次第而枚舉之辭也則祖甲之為祖甲而非太甲明矣自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年過樂謂之耽泛言自三宗之後即君位者生則逸豫不知稼穡之艱難不聞小人之勞惟耽樂之從伐性喪生故自三宗之後亦無能壽考逺者不過十年七八年近者五六年三四年爾耽樂愈甚則享年愈促也凡人莫不欲壽而惡夭此篇專以享年永不永為言所以開其所欲而禁其所當戒也周公曰嗚呼厥亦惟我周太王王季克自抑畏商猶異世也故又即我周先王告之言太王王季能自謙抑謹畏者蓋將論文王之無逸故先述其源流之深長也大抵抑畏者無逸之本縱肆怠荒皆矜誇無忌憚者之為故下文言文王曰柔曰恭曰不敢皆原太王王季抑畏之心發之耳文王卑服即康功田功卑服猶禹所謂惡衣服也康功安民之功田功養民之功言文王於衣服之奉所性不存而專意於安養斯民也卑服蓋舉一端而言宫室飲食自奉之薄皆可類推徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民徽懿皆美也昃日昳也柔謂之徽則非柔懦之柔恭謂之懿則非足恭之恭文王有柔恭之德而極其徽懿之盛和易近民於小民則懷保之於鰥寡則惠鮮之惠鮮云者鰥寡之人垂首喪氣賚豫賙給之使之有生意也自朝至于日之中自中至于日之昃一食之頃有不遑暇欲咸和萬民使無一不得其所也文王心在乎民自不知其勤勞如此豈秦始皇衡石程書隋文帝衛士傳餐代有司之任者之為哉立政言罔攸兼于庶言庶獄庶慎則文王又若無所事事者不讀無逸則無以知文王之勤不讀立政則無以知文王之逸合二書觀之則文王之所從事可知矣文王不敢盤于遊田以庶邦惟正之供文王受命惟中身厥享國五十年遊田國有常制文王不敢盤遊無度上不濫費故下無過取而能以庶邦惟正之供於常貢正數之外無橫斂也言庶邦則民可知文王為西伯所統庶邦皆有常供春秋貢於霸主者班班可見至唐猶有送使之制則諸侯之供方伯舊矣受命言為諸侯也中身者漢孔氏曰文王九十七而終即位時年四十七言中身舉全數也上文崇素儉恤孤獨勤政事戒遊佚皆文王無逸之實故其享國有歷年之永周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供則法也其指文王而言淫過也言自今日以往嗣王其法文王無過于觀逸遊田以萬民惟正賦之供上文言遊田而不言觀逸以大而包小也言庶邦而不言萬民以逺而見近也無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒德哉無與毋通皇與遑通訓法若順則法也毋自寬假曰今日姑為是耽樂也一日耽樂固若未害然下非民之所法上非天之所順時人大法其過逸之行猶商人化受而崇飲之類故繼之曰毋若商王受之沈迷酗于酒德哉酗酒謂之德者德有凶有吉韓子所謂道與德為虛位是也周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻譸張流反幻音患胥相訓誡惠順譸誑張誕也變名易實以眩觀者曰幻歎息言古人德業已盛其臣猶且相與誡告之相與保惠之相與教誨之保惠者保養而將順之非特誡告而已也教誨則有規正成就之意又非特保惠而已也惟其若是是以視聽思慮無所蔽塞好惡取豫明而不悖故當時之民無或敢誑誕為幻也此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝否俯久反詛莊助反祝音呪正刑正法也言成王於上文古人胥訓告保惠教誨之事而不聽信則人乃法則之君臣上下師師非度必變亂先王之正法無小無大莫不盡取而紛更之蓋先王之法甚便於民甚不便於縱侈之君如省刑罰以重民命民之所便也而君之殘酷者則必變亂之如薄賦斂以厚民生民之所便也而君之貪侈者則必變亂之厥心違怨者怨之蓄于中也厥口詛祝者怨之形于外也為人上而使民心口交怨其國不危者未之有也此蓋治亂存亡之機故周公􅈤􅈤言之周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王兹四人迪哲迪蹈哲智也孟子以知而弗去為智之實迪云者所謂弗去是也人主知小人之依而或忿戾之者是不能蹈其知者也惟中宗高宗祖甲文王允蹈其知故周公以迪哲稱之厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢含怒詈力智反詈罵言也其或有告之曰小人怨汝詈汝汝則皇自敬德反諸其身不尤其人其所誣毁之愆安而受之曰是我之愆允若時者誠實若是非止隱忍不敢藏怒也蓋三宗文王於小民之依心誠知之故不暇責小人之過言且因以察吾身之未至怨詈之語乃所樂聞是豈特止於隱忍含怒不發而已哉此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寬綽厥心亂罰無罪殺無辜怨有同是叢于厥身綽尺約反綽大叢聚也言成王於上文三宗文王迪哲之事不肯聽信則小人乃或誑誕變置虛實曰小民怨汝詈汝汝則聽信之則如是不能永念其為君之道不能寬大其心以誑誕無實之言羅織疑似亂罰無罪殺戮無辜天下之人受禍不同而同於怨皆叢於人君之一身亦何便於此哉大抵無逸之書以知小人之依為一篇綱領而此章則申言既知小人之依則當蹈其知也三宗文王能蹈其知故其胸次寬平人之怨詈不足以芥蒂其心如天地之於萬物一於長育而已其悍疾憤戾天豈私怒於其間哉天地以萬物為心人君以萬民為心故君人者要當以民之怨詈為己責不當以民之怨詈為己怒以為己責則民安而君亦安以為己怒則民危而君亦危矣吁可不戒哉周公曰嗚呼嗣王其監于兹兹者指上文而言也無逸一篇七章章首皆先致其咨嗟詠歎之意然後及其所言之事至此章則於嗟歎之外更無他語惟以嗣王其監於兹結之所謂言有盡而意則無窮成王得無深警於此哉君奭召公告老而去周公留之史氏録其告語為篇亦誥體也以周公首呼君奭因以君奭名篇篇中語多未詳今文古文皆有按此篇之作史記謂召公疑周公當國踐祚唐孔氏謂召公以周公嘗攝王政今復在臣位葛氏謂召公未免常人之情以爵位先後介意故周公作是篇以諭之陋哉斯言要皆為序文所誤獨蘇氏謂召公之意欲周公告老而歸為近之然詳本篇㫖意乃召公自以盛滿難居欲避權位退老厥邑周公反覆告諭以留之爾熟復而詳味之其義固可見也周公若曰君奭君者尊之之稱奭召公名也古人尚質相與語多名之弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥不祥者休之反也天既下喪亡于殷殷既失天命我有周既受之矣我不敢知曰其基業長信於休美乎如天果輔我之誠耶我亦不敢知曰其終果出於不祥乎按此篇周公留召公而作此其言天命吉凶雖曰我不敢知然其􅈤惻危懼之意天命吉凶之決實主於召公留不留如何也嗚呼君已曰時我我亦不敢寧于上帝命弗永遠念天威越我民罔尤違惟人在我後嗣子孫大弗克恭上下遏佚前人光在家不知尤怨違背也周公歎息言召公已嘗曰是在我而已周公謂我亦不敢苟安天命而不永逺念天之威於我民無尤怨背違之時也天命民心去就無常實惟在人而已今召公乃忘前日之言翻然求去使在我後嗣子孫大不能敬天敬民驕慢肆侈遏絶佚墜文武光顯可得謂在家而不知乎天命不易天難諶乃其墜命弗克經歷嗣前人恭明德諶時壬反天命不易猶詩曰命不易哉命不易保天難諶信乃其墜失天命者以不能經歷繼嗣前人之恭明德也吳氏曰弗克恭故不能嗣前人之恭德遏佚前人光故不能嗣前人之明德在今豫小子旦非克有正迪惟前人光施于我沖子吳氏曰小子自謙之辭也非克有正亦自謙之辭也言在今我小子旦非能有所正也凡所開導惟以前人光大之德使益焜耀而付于沖子而已以前言後嗣子孫遏佚前人光而言也又曰天不可信我道惟寧王德延天不庸釋于文王受命又曰者以上文言天命不易天難諶此又申言天不可信故曰又曰天固不可信然在我之道惟以延長武王之德使天不容捨文王所受之命也公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤時則有若者言當其時有如此人也保衡即伊尹也見說命太戊太甲之孫伊陟伊尹之子臣扈與湯時臣扈二人而同名者也巫氏咸名祖乙太戊之孫巫賢巫咸之子也武丁高宗也甘盤見說命呂氏曰此章序商六臣之烈蓋勉召公匹休於前人也伊尹佐湯以聖輔聖其治化與天無間伊陟臣扈之佐太戊以賢輔賢其治化克厭天心自其遍覆言之謂之天自其主宰言之謂之帝書或稱天或稱帝各隨所指非有重輕至此章對言之則聖賢之分而深淺見矣巫賢止言其乂王家者咸之為治功在王室精微之藴猶有愧於二臣也亡書有咸乂四篇其乂王家之實歟巫賢甘盤而無指言者意必又次於巫咸也蘇氏曰殷有聖賢之君七此獨言五下文云殷禮陟配天豈配祀于天者止此五王而其臣偕配食于廟乎在武丁時不言傅說豈傅說不配食于配天之王乎其詳不得而聞矣率惟兹有陳保乂有殷故殷禮陟配天多歷年所陟升遐也言六臣循惟此道有陳列之功以保乂有殷故殷先王終以德配天而享國長久也天惟純佑命則商實百姓王人罔不秉德明恤小臣屏侯甸矧咸奔走惟兹惟德稱用乂厥辟故一人有事于四方若卜筮罔不是孚佑助也實虛實之實國有人則實孟子言不信仁賢則國空虛是也稱舉也亦秉持之義事征伐㑹同之類承上章六臣輔君格天致治遂言天佑命有商純一而不雜故商國有人而實內之百官著姓與夫王臣之微者無不秉持其德明致其憂外之小臣與夫藩屏侯甸矧皆奔走服役惟此之故惟德是舉用乂其君故君有事于四方如龜之卜如蓍之筮天下無不敬信之也公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦呂氏曰坦然無私之謂平格者通徹三極而無間者也天無私壽惟至平通格于天者則壽之伊尹而下六臣能盡平格之實故能保乂有殷多歷年所至于殷紂亦嗣天位乃驟罹滅亡之威天曾不私壽之也固命者不墜之天命也今召公勉為周家久永之念則有天之固命其治效亦赫然明著於我新造之邦而身與國俱顯矣公曰君奭在昔上帝割申勸寧王之德其集大命于厥躬申重勸勉也在昔上帝降割于殷申勸武王之德而集大命于其身使有天下也惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括虢叔文王弟閎散泰南宫皆氏夭宜生顛括皆名言文王庶幾能修治燮和我所有諸夏者亦惟有虢叔等五臣為之輔也康誥言一二邦以修無逸言用咸和萬民即文王修和之實也又曰無能往來兹迪彝教文王蔑德降于國人蔑莫結反蔑無也夏氏曰周公前既言文王之興本此五臣故又反前意而言曰若此五臣者不能為文王往來奔走於此導迪其常教則文王亦無德降及於國人矣周公反覆以明其意故以又曰更端發之亦惟純佑秉德迪知天威乃惟時昭文王迪見冒聞于上帝惟時受有殷命哉言文王有此五臣者故亦如殷為天純佑命百姓王人罔不秉德也上既反言文王若無此五臣為迪彝教則亦無德下及國人故此又正言亦惟天乃純佑文王蓋以如是秉德之臣蹈履至到實知天威以是昭明文王啓迪其德使著見於上覆冒於下而升聞于上帝惟是之故遂能受有殷之天命也武王惟兹四人尚迪有祿後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱德單與殫通稱平聲虢叔先死故曰四人劉殺也單盡也武王惟此四人庶幾迪有天祿其後暨武王盡殺其敵惟此四人能昭武王遂覆冒天下天下大盡稱武王之德謂其逹聲教於四海也文王冒西土而已丕單稱德惟武王為然於文王言命於武王言祿者文王但受天命至武王方富有天下也呂氏曰師尚父之事文武烈莫盛焉不與五臣之列蓋一時議論或詳或略隨意而言主於留召公而非欲為人物評也今在豫小子旦若游大川豫往暨汝奭其濟小子同未在位誕無我責收罔朂不及耇造德不降我則鳴鳥不聞矧曰其有能格小子旦自謙之稱也浮水曰游周公言承文武之業懼不克濟若浮大川罔知津涯豈能獨濟哉豫往與汝召公其共濟可也小子成王也成王幼沖雖已即位與未即位同誕大也大無我責上疑有缺文收罔勗不及未詳耇造德不降言召公去則耇老成人之德不下於民在郊之鳯將不復得聞其鳴矣况敢言進此而有感格乎是時周方隆盛鳴鳯在郊卷阿鳴于高岡者乃詠其實故周公云爾也公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷肆大猷謀也兹指上文所言周公歎息欲召公大監視上文所陳也我文武受命固有無疆之美矣然迹其積纍締造蓋亦艱難之大者不可不相與竭力保守之也告君謀所以寬裕之道勿狹隘求去我不欲後人迷惑而失道也呂氏曰大臣之位百責所萃震撼擊撞欲其鎮定辛甘燥濕欲其調齊盤錯棼結欲其解紓黯暗汚濁欲其茹納自非曠度洪量與夫患失乾沒者未嘗無翩然捨去之意况召公親遭大變破斧缺斨之時屈折調護心勞力瘁又非平時大臣之比顧以成王未親政不敢乞身爾一旦政柄有歸浩然去志固人情之所必至然思文武王業之艱難念成王守成之無助則召公義未可去也今乃汲汲然求去之不暇其迫切已甚矣盍謀所以寬裕之道圖功攸終展布四體為久大規模使君德開明未可捨去而聽後人之迷惑也公曰前人敷乃心乃悉命汝作汝民極曰汝明勗偶王在亶乘兹大命惟文王德丕承無疆之恤偶配也蘇氏曰周公與召公同受武王顧命輔成王故周公言前人敷乃心腹以命汝召公位三公以為民極且曰汝當明勉輔孺子如耕之有偶也在於相信如車之有馭也并力一心以載天命念文考之舊德以丕承無疆之憂武王之言如此而可以去乎公曰君告汝朕允保奭其汝克敬以豫監于殷喪大否肆念我天威大否大亂也告汝以我之誠呼其官而名之言汝能敬以我所言監視殷之喪亡大亂可不大念我天威之可畏乎豫不允惟若兹誥豫惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬德明我俊民在讓後人于丕時戡勝也戡堪古通用周公言我不信於人而若此告語乎豫惟曰王業之成在我與汝而已汝聞我言而有合哉亦曰在是二人但天休滋至惟是我二人將不堪勝汝若以盈滿為懼則當能自敬德益加寅畏明揚俊民布列庶位以盡大臣之職業以答滋至之天休毋徒惴惴而欲去為也他日在汝推遜後人于大盛之時超然肥遁誰復汝禁今豈汝辭位之時乎嗚呼篤棐時二人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾周公復歎息言篤於輔君者是我二人我用能至于今日休盛然我欲與召公共成文王功業于不怠大覆冒斯民使海隅日出之地無不臣服然後可也周都西土去東為遠故以日出言吳氏曰周公未嘗有其功以其留召公故言之蓋敘其所已然而勉其所未至亦人所說而從者也公曰君豫不惠若兹多誥豫惟用閔于天越民周公言我不順於理而若兹諄復之多誥耶豫惟用憂天命之不終及斯民之無賴也韓子言畏天命而悲人窮亦此意前言若兹誥故此言若兹多誥周公之告召公其言語之際亦可悲矣公曰嗚呼君惟乃知民德亦罔不能厥初惟其終祗若兹往敬用治上章言天命民心而民心又天命之本也故卒章專言民德以終之周公歎息謂召公踐歷諳練之久惟汝知民之德民德謂民心之嚮順亦罔不能其初今日固罔尤違矣當思其終則民之難保者尤可畏也其祗順此誥往敬用治不可忽也此召公已留周公飭遣就職之辭厥後召公既相成王又相康王再世猶未釋其政有味於周公之言也夫蔡仲之命蔡國名仲字蔡叔之子也叔沒周公以仲賢命諸成王復封之蔡此其誥命之辭也今文無古文有按此篇次敘當在洛誥之前惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡周公位冢宰正百工武王崩時也郭鄰孔氏曰中國之外地名蘇氏曰郭虢也周禮六遂五家為鄰管霍國名武王崩成王幼周公居冢宰百官總已以聽者古今之通道也當是時三叔以主少國疑乘商人之不靖謂可惑以非義遂相與流言倡亂以搖之是豈周公一身之利害乃欲顛覆社稷塗炭生靈天討所加非周公所得已也故致辟管叔于商致辟云者誅戮之也囚蔡叔于郭鄰以車七乘囚云者制其出入而猶從以七乘之車也降霍叔于庶人三年不齒三年之後方齒録以復其國也三叔刑罰之輕重因其罪之大小而已仲叔之子克常敬德周公以為卿士叔卒乃命之成王而封之蔡也周公留佐成王食邑於圻內圻內諸侯孟仲二卿故周公用仲為卿非魯之卿也蔡左傳在淮汝之間仲不别封而命邦之蔡者所以不絶叔於蔡也封仲以他國則絶叔於蔡矣呂氏曰象欲殺舜舜在側微其害止於一身故舜得遂其友愛之心周公之位則繫於天下國家雖欲遂友愛於三叔不可得也舜與周公易地皆然史臣先書惟周公位冢宰正百工而繼以羣叔流言所以結正三叔之罪也後言蔡仲克庸祗德周公以為卿士叔卒即命之王以為諸侯以見周公蹙然於三叔之刑幸仲克庸祗德則亟擢用分封之也吳氏曰此所謂冢宰正百工與詩所謂攝政皆在成王諒暗之時非以幼沖而攝而其攝也不過位冢宰之位而已亦非如荀卿所謂攝天子位之事也三年之喪二十五月而畢方其畢時周公固未嘗攝亦非有七年而後還政之事也百官總已以聽冢宰未知其所從始如殷之高宗已然不特周公行之此皆論周公者所當先知也王若曰小子胡惟爾率德改行克慎厥猷肆豫命爾侯于東土往即乃封敬哉胡仲名言仲循祖文王之德改父蔡叔之行能謹其道故我命汝為侯于東土往就汝所封之國其敬之哉呂氏曰敬哉者欲其無失此心也命書之辭雖稱成王實周公之意爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彝訓無若爾考之違王命蔡叔之罪在於不忠不孝故仲能掩前人之愆者惟在於忠孝而已叔違王命仲無所因故曰邁迹自身克勤無怠所謂自身也垂憲乃後所謂邁迹也率乃祖文王之彝訓無若爾考之違王命上文所謂率德改行也皇天無親惟德是輔民心無常惟惠之懷為善不同同歸于治為惡不同同歸于亂爾其戒哉此章與伊尹申誥太甲之言相類而有深淺不同者太甲蔡仲之有間也善固不一端而無不可行之善惡亦不一端而無可為之惡爾其可不戒之哉慎厥初惟厥終終以不困不惟厥終終以困窮惟思也窮困之極也思其終者所以謹其初也懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民勉汝所立之功親汝四鄰之國蕃屏王家和協同姓康濟小民五者諸侯職之所當盡也率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則豫一人汝嘉率循也無毋同詳審也中者心之理而無過不及之差者也舊章者先王之成法厥度者吾身之法度皆中之所出者作聰明則喜怒好惡皆出於私而非中矣其能不亂先王之舊章乎戒其本於己者然也側言一偏之言也視聽不審惑於一偏之說則非中矣其能不改吾身之法度乎戒其狥於人者然也仲能戒是則我一人汝嘉矣呂氏曰作聰明者非天之聰明特沾沾小智耳作與不作而天人判焉王曰嗚呼小子胡汝往哉無荒棄朕命飭往就國戒其毋廢棄我命汝所言也多方成王即政奄與淮夷又叛成王滅奄歸作此篇按費誓言徂兹淮夷徐戎並興即其事也疑當時扇亂不特殷人如徐戎淮夷四方容或有之故及多方亦誥體也今文古文皆有蘇氏曰大誥康誥酒誥梓材召誥洛誥多士多方八篇雖所誥不一然大略以殷人心不服周而作也豫讀泰誓武成常怪周取殷之易及讀此八篇又怪周安殷之難也多方所誥不止殷人乃及四方之士是紛紛焉不心服者非獨殷人也豫乃今知湯已下七王之德深矣方殷之虐人如在膏火中歸周如流不暇念先王之德及天下粗定人自膏火中出即念殷先七王如父母雖以武王周公之聖相繼撫之而莫能禦也夫以西漢道德比之殷猶碔砆之與美玉然王莽公孫述隗囂之流終不能使人忘漢光武成功若建瓴然使周無周公則亦殆矣此周公之所以畏而不敢去也惟五月丁亥王來自奄至于宗周成王即政之明年商奄又叛成王征滅之杜預云奄不知所在宗周鎬京也呂氏曰王者定都天下之所宗也東遷之後定都于洛則洛亦謂之宗周衛孔悝之鼎銘曰隨難于漢陽即宫于宗周是時鎬已封秦宗周蓋指洛也然則宗周初無定名隨王者所都而名耳周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知呂氏曰先曰周公曰而復曰王若曰何也明周公傳王命而非周公之命也周公之命誥終於此篇故發例於此以見大誥諸篇凡稱王曰者無非周公傳成王之命也成王滅奄之後告諭四國殷民而因以曉天下也所主殷民故又專提殷侯之正民者告之言殷民罪應誅戮我大降宥爾命爾宜無不知也洪惟圖天之命弗永寅念于祀圖謀也言商奄大惟私意圖謀天命自底滅亡不深長敬念以保其祭祀吕氏曰天命可受而不可圖圖則人謀之私而非天命之公矣此蓋深示以天命不可妄干乃多方一篇之綱領也下文引夏商所以失天命受天命者以明示之惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞言帝降災異以譴告桀桀不知戒懼乃大肆逸豫憂民之言尚不肯出諸口况望其有憂民之實乎勸勉也迪啓迪也視聽動息日用之間洋洋乎皆上帝所以啓迪開導斯人者桀乃大肆淫昏終日之間不能少勉於是天理或幾乎息矣况望有惠迪而不違乎此乃爾之所聞欲其因桀而知紂也厥逸與多士引逸不同者猶亂之為亂為治耳逸豫以民言淫昏以帝言各以其義也此章上疑有闕文厥圖帝之命不克開于民之麗乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑叨他刀反懫陟利反此章文多未詳麗猶日月麗乎天之麗謂民之所依以生者也依於土依於衣食之類甲始也言桀矯誣上天圖度帝命不能開民衣食之原於民依恃以生者一皆抑塞遏絶之猶乃大降威虐于民以增亂其國其所因則始于內嬖蠱其心敗其家不能善承其衆不能大進於恭而大寬裕其民亦惟夏邑之民貪叨忿懫者則日欽崇而尊用之以戕害於其國也天惟時求民主乃大降顯休命于成湯刑殄有夏言天惟是為民求主耳桀既不能為民之主天乃大降顯休命於成湯使為民主而伐夏殄滅之也呂氏曰曰求曰降豈真有求之降之者哉天下無統渙散漫流勢不得不歸其所聚而湯之一德乃所謂顯休命之實一衆離而聚之者也民不得不聚於湯湯不得不受斯民之聚是豈人為之私哉故曰天求之天降之也惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開純大也義民賢者也言天不與桀者大乃以爾多方賢者不克永于多享以至于亡也言桀於義民不能用其所敬之多士率皆不義之民上文所謂叨懫日欽者同惡相濟大不能明保享于民乃相與播虐于民民無所措其手足凡百所為無一能達上文所謂不克開于民之麗者政暴民窮所以速其亡也此雖指桀多士爾殷侯尹民嘗逮事紂者寧不惕然內愧乎乃惟成湯克以爾多方簡代夏作民主簡擇也民擇湯而歸之慎厥麗乃勸厥民刑用勸湯深謹其所依以勸勉其民故民皆儀刑而用勸勉也人君之於天下仁而已矣仁者君之所依也君仁則莫不仁矣以至于帝乙罔不明德慎罰亦克用勸明德則民愛慕之謹罰則民畏服之自成湯至于帝乙雖歷世不同而皆知明其德謹其罰故亦能用以勸勉其民也明德謹罰所以謹厥麗也明德仁之本也謹罰仁之政也要囚殄戮多罪亦克用勸開釋無辜亦克用勸德明之而已罰有辟焉有宥焉故再言辟而當罪亦能用以勸勉宥而赦過亦能用以勸勉言辟與宥皆足以使人勉於善也今至于爾辟弗克以爾多方享天之命呂氏曰爾辟謂紂也商先哲王世傳家法積纍維持如此今一旦至于汝君乃以爾全盛之多方不克坐享天命而亡之是誠可閔也天命至公操則存舍則亡以商先王之多基圖之大紂曾不得席其餘䕃其亡忽焉危微操舍之幾周公所以示天下深矣豈徒曰慰解之而已哉嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷先言嗚呼而後言王若曰者唐孔氏曰周公先自歎息而後稱王命以誥之也庸用也有心之謂釋去之也上文言夏殷之亡因言非天有心於去夏亦非天有心於去殷下文遂言乃惟桀紂自取滅亡也呂氏曰周公先自歎息而始宣布成王之誥告以見周公未嘗稱王也又此篇之始周公曰王若曰復語相承書無此體也至於此章先嗚呼而後王若曰書亦無此體也周公居聖人之變史官豫憂來世傳疑襲誤蓋有竊之為口實矣故於周公誥命終篇發新例二著周公實未嘗稱王所以别嫌明微而謹萬世之防也乃惟爾辟以爾多方大淫圖天之命屑有辭紂以多方之富大肆淫泆圖度天命瑣屑有辭與多士言桀大淫泆有辭義同殷之亡非自取乎以下二章推之此章之上當有闕文乃惟有夏圖厥政不集于享天降時喪有邦閒之集萃也享享有之享桀圖其政不集于享而集于亡故天降是喪亂而俾有殷代之夏之亡非自取乎乃惟爾商後王逸厥逸圖厥政不蠲蒸天惟降時喪蠲潔蒸進也紂以逸居逸淫湎無度故其為政不蠲潔而穢惡不蒸進而怠惰天以是降喪亡于殷殷之亡非自取乎此上三節皆應上文非天庸釋之語惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽聖通明之稱言聖而罔念則為狂矣愚而能念則為聖矣紂雖昏愚亦有可改過遷善之理故天又未忍遽絶之猶五年之久須待暇寬於紂覬其克念大為民主而紂無可念可聽者五年必有指實而言孔氏牽合歲月者非是或曰狂而克念果可為聖乎曰聖固未易為也狂而克念則作聖之功知所向方太甲其庶幾矣聖而罔念果至於狂乎曰聖固無所謂罔念也禹戒舜曰無若丹朱傲惟慢遊是好一念之差雖未至於狂而狂之理亦在是矣此人心惟危聖人拳拳告戒豈無意哉天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之紂既罔可念聽天於是求民主於爾多方大警動以祲祥譴告之威以開發其能受眷顧之命者而爾多方之衆皆不足以堪眷顧之命也惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方典主式用也克堪者能勝之謂也德輶如毛民鮮克舉之言德舉者莫能勝也文武善承其衆克堪用德是誠可以為神天之主矣故天式教文武用以休美簡擇畀付殷命以正爾多方也呂氏曰式教用休者如之何而教之也文武既得乎天天德日新左右逢原其思也若或起之其行也若或翼之乃天之所以教而用以昌大休明者也非諄諄然而教之也此章深論天下向者天命未定眷求民主之時能者則得之孰有遏汝者乃無一能當天之眷今天既命我周而定于一矣爾猶洶洶不靖欲何為耶明指天命而讋服四海姦雄之心者莫切於是今我曷敢多誥我惟大降爾四國民命言今我何敢如此多誥我惟大降宥爾四國民命舉其宥過之恩而責其遷善之實也爾曷不忱裕之于爾多方爾曷不夾介乂我周王享天之命今爾尚宅爾宅畋爾田爾曷不惠王熙天之命夾訖洽反夾夾輔之夾介賔介之介爾何不誠信寬裕於爾之多方乎爾何不夾輔介助我周王享天之命乎爾之叛亂據法定罪則瀦其宅收其田可也今爾猶得居爾宅耕爾田爾何不順我王室各守爾典以廣天命乎此三節責其何不如此也爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正爾乃屢蹈不靖自取亡滅爾心其未知所以自愛耶爾乃大不安天命耶爾乃輕棄天命耶爾乃自為不法欲圖見信于正者以為當然耶此四節責其不可如此也我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜我惟是教告而誨諭之我惟是戒懼而要囚之今至于再至于三矣爾不用我降宥爾命而猶狃於叛亂反覆我乃其大罰殛殺之非我有周持德不安靜乃惟爾自為凶逆以速其罪爾王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀監監洛邑之遷民者也猶諸侯之分民有君道焉所以謂之臣我監也言商士遷洛奔走臣服我監於今五年矣不曰年而曰祀者因商俗而言也又按成周既成而成王即政成王即政而商奄繼叛事皆相因才一二年耳今言五祀則商民之遷固在作洛之前矣尤為明驗越惟有胥伯小大多正爾罔不克臬臬事也周官多以胥以伯以正為名胥伯小大衆多之正蓋殷多士授職於洛共長治遷民者也其奔走臣我監亦久矣宜相體悉竭力其職無或反側偷惰而不能事也自作不和爾惟和哉爾室不睦爾惟和哉爾邑克明爾惟克勤乃事心不安靜則身不和順矣身不安靜則家不和順矣言爾惟和哉者所以勸勉之也和其身睦其家而後能協于其邑歡然有恩以相愛粲然有文以相接爾邑克明始為不負其職而可謂克勤乃事矣前既戒以罔不克臬故以克勤乃事期之也爾尚不忌于凶德亦則以穆穆在乃位克閲于乃邑謀介忌畏也穆穆和敬貌頑民誠可畏矣然如上文所言爾多士庶幾不至畏忌頑民凶德亦則以穆穆和敬端處爾位以潜消其悍逆悖戾之氣又能簡閲爾邑之賢者以謀其助則民之頑者且革而化矣尚何可畏之有哉成王誘掖商士之善以化服商民之惡其轉移感動之機微矣哉爾乃自時洛邑尚永力畋爾田天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚爾乃自時洛邑庶幾可以保有其業力畋爾田天亦將畀豫矜憐於爾我有周亦將大介助賚錫於爾啓迪簡拔置之王朝矣其庶幾勉爾之事有服在大僚不難至也多士篇商民嘗以夏迪簡在王庭有服在百僚為言故此因以勸勵之也王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大遠王命則惟爾多方探天之威我則致天之罰離逖爾土誥告將終乃歎息言爾多士如不能相勸信我之誥命爾亦則惟不能享上凡爾之民亦惟曰上不必享矣爾乃放逸頗僻大違我命則惟爾多士自取天威我亦致天之罰播流蕩析俾爾離遠爾土矣爾雖欲宅爾宅畋爾田尚可得哉多方疑當作多士上章既勸之以休此章則董之以威商民不惟有所慕而不敢違越且有所畏而不敢違越矣王曰我不惟多誥我惟祗告爾命我豈若是多言哉我惟敬告爾以上文勸勉之命而已又曰時惟爾初不克敬于和則無我怨與之更始故曰時惟爾初也爾民至此苟又不能敬于和猶復乖亂則自底誅戮毋我怨尤矣開其為善禁其為惡周家忠厚之意於是篇尤為可見呂氏曰又曰二字所以形容周公之惓惓斯民命已畢而猶有餘情誥已終而猶有餘語顧盻之光猶曄然溢於簡冊也立政吳氏曰此書戒成王以任用賢才之道而其㫖意則又上戒成王專擇百官有司之長如所謂常伯常任準人等云者蓋古者外之諸侯一卿已命於君內之卿大夫則亦自擇其屬如周公以蔡仲為卿士伯冏謹簡乃僚之類其長既賢則其所舉用無不賢者矣葛氏曰誥體也今文古文皆有周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉綴朱衛丁劣二反賁音奔此篇周公所作而記之者周史也故稱若曰言周公帥羣臣進戒于王贊之曰拜手稽首告嗣天子王矣羣臣用皆進戒曰王左右之臣有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人三事之外掌服器者曰綴衣執射御者曰虎賁皆任用之所當謹者周公於是歎息言曰美矣此官然知憂恤者鮮矣言五等官職之美而知憂其得人者少也吳氏曰綴衣虎賁近臣之長也葛氏曰綴衣周禮司服之類虎賁周禮之虎賁氏也古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民恂音荀古之人有行此道者惟有夏之君當王室大强之時而求賢以為事天之實也迪知者蹈知而非苟知也忱恂者誠信而非輕信也言夏之臣蹈知誠信于九德之行乃敢告教其君曰拜手稽首后矣云者致敬以尊其為君之名也曰宅乃事宅乃牧宅乃準兹惟后矣云者致告以敘其為君之實也兹者此也言如此而後可以為君也即臯陶與禹言九德之事謀面者謀人之面貌也言非迪知忱恂于九德之行而徒謀之面貌用以為大順於德乃宅而任之如此則三宅之人豈復有賢者乎蘇氏曰事則向所謂常任也牧則向所謂常伯也準則向所謂準人也一篇之中所論宅俊者參差不齊然大要不出是三者其餘則皆小臣百執事也吳氏曰古者凡以善言語人皆謂之教不必自上教下而後謂之教也桀德惟乃弗作往任是惟暴德罔後夏桀惡德弗作往昔先王任用三宅而所任者乃惟暴德之人故桀以喪亡無後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德亦越者繼前之辭也耿光也湯自七十里升為天子典禮命討昭著於天下所謂陟丕釐上帝之光命也三宅謂居常伯常任準人之位者三俊謂有常伯常任準人之才者克即者言湯所用三宅實能就是位而不曠其職所稱三俊實能就是德而不浮其名也三俊說者謂他日次補三宅者詳宅以位言俊以德言意其儲養待用或如說者所云也惟思式法也湯於三宅三俊嚴思而丕法之故能盡其宅俊之用而宅者得以效其職俊者得以著其才賢智奮庸登於至治其在商邑用協于厥邑近者察之詳其情未易齊畿甸之協則純之至也其在四方用丕式見德遠者及之難其德未易遍觀法之同則大之至也至純至大治道無餘藴矣曰邑曰四方者各極其逺近而言耳嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓暋音敏奄衣檢反羞刑進任刑戮者也庶習備諸衆醜者也言紂德强暴又所與共國者惟羞刑暴德之諸侯所與共政者惟庶習逸德之臣下上帝敬致其罰乃使我周有此諸夏用商所受之命而奄甸萬姓焉甸者井牧其地什伍其民也亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯三宅三俊文武克知灼見皆曰心者即所謂迪知忱恂而非謀面也三宅已授之位故曰克知三俊未任以事故曰灼見以是敬事上帝則天職修而上有所承以是立民長伯則體統立而下有所寄人君位天人之兩間而俯仰無怍者以是也夏之尊帝商之丕釐周之敬事其義一也長如王制所謂五國以為屬屬有長伯如王制所謂二百一十國以為州州有伯是也立政任人準夫牧作三事言文武立政三宅之官也任人常任也準夫準人也牧常伯也以職言故曰事虎賁綴衣趣馬小尹左右攜僕百司庶府此侍御之官也趣馬掌馬之官小尹小官之長攜僕攜持僕御之人百司若司裘司服庶府若內府太府之屬也大都小伯藝人表臣百司太史尹伯庶常吉士此都邑之官也呂氏曰大都小伯者謂大都之伯小都之伯也大都言都不言伯小伯言伯不言都互見之也藝人者卜祝巫匠執技以事上者表臣百司表外也表對裏之詞上文百司蓋內百司若內府內司服之屬所謂裏臣也此百司蓋外百司若外府外司服之屬所謂表臣也太史者史官也尹伯者有司之長如庖人內饔膳夫則是數尹之伯也鐘師尹鐘磬師尹磬大師司樂則是數尹之伯也凡所謂官吏莫不在內外百司之中至於特見其召者則皆有意焉虎賁綴衣趣馬小尹左右攜僕以扈衛親近而見庶府以冗賤人所易忽而見藝人恐其或興淫巧機詐以蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊畿不預百司之數者既條陳歷數文武之衆職而總結之曰庶常吉士庶衆也言在文武之廷無非常德吉士也司徒司馬司空亞旅此諸侯之官也司徒主邦教司馬主邦政司空主邦土餘見牧誓言諸侯之官莫不得人也諸侯之官獨舉此者以其名位通於天子歟夷微盧蒸三亳阪尹此王官之監於諸侯四夷者也微盧見經亳見史三亳蒙為北亳榖熟為南亳偃師為西亳蒸或以為衆或以為夷名阪未詳古者險危之地封疆之守或不以封而使王官治之參錯於五服之間是之謂尹地志載王官所治非一此特舉其重者耳自諸侯三卿以降惟列官名而無他語承上庶常吉士之文以內見外也夫上自王朝內而都邑外而諸侯遠而夷狄莫不皆得人以為官使何其盛歟文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯用能俊有德也不言準人者因上章言文王用人而申克知三有宅心之說故略之也文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶言號令也庶獄獄訟也庶慎國之禁戒儲備也有司有職主者牧夫牧人也文王不敢下侵庶職惟於有司牧夫訓敕用命及違命者而已漢孔氏曰勞於求才逸於任賢庶獄庶慎文王罔敢知于兹上言罔攸兼則猶知之特不兼其事耳至此罔敢知則若未嘗知有其事蓋信任之益專也上言庶言此不及者號令出於君有不容不知者故也呂氏曰不曰罔知于兹而曰罔敢知于兹者徒言罔知則是莊老之無為也惟言罔敢知然後見文王敬畏思不出位之意毫釐之辨學者宜精察之亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基率循也敉功安天下之功義德義德之人容德容德之人蓋義德者有撥亂反正之才容德者有休休樂善之量皆成德之人也周公上文言武王率循文王之功而不敢替其所用義德之人率循文王之謀而不敢違其容德之士意如虢叔閎夭散宜生泰顛南宫括之徒所以輔成王業者文用之於前武任之於後故周公於君奭言五臣克昭文王受有殷命武王惟兹四人尚迪有祿正猶此敘文武用人而言並受此丕丕基也嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之我者指王而言若順也周公既述文武基業之大歎息而言曰孺子今既為王矣繼此以往王其於立政立事準人牧夫之任當能明知其所順順者其心之安也孔子曰察其所安人焉廋哉察其所順者知人之要也夫既明知其所順果正而不他然後推心而大委任之使展布四體以為治相助左右所受之民和調均齊獄慎之事而又戒其勿以小人間之使得終始其治此任人之要也民而謂之受者言民者乃受之於天受之於祖宗非成王之所自有也自一話一言我則末惟成德之彥以乂我受民末終惟思也自一話一言之間我則終思成德之美士以治我所受之民而不敢斯須忘也嗚呼豫旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之前所言禹湯文武仕人之事無非至美之言我聞之於人者已皆告孺子王矣文子文孫者成王武王之文子文王之文孫也成王之時法度彰禮樂著守成尚文故曰文誤失也有所兼有所知不付之有司而以已誤之也正猶康誥所謂正人與宫正酒正之正指當職者為言不以已誤庶獄庶慎惟當職之人是治之下文言其勿誤庶獄惟有司之牧夫即此意自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂自古及商人及我周文王於立政所以用三宅之道則克宅之者能得賢者以居其職也克由繹之者能紬繹用之而盡其才也既能宅其才以安其職又能繹其才以盡其用兹其所以能俾乂也歟國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家勱音邁自古為國無有立政用憸利小人者小人而謂之憸者形容其沾沾便捷之狀也憸利小人不順于德是無能光顯以在厥世王當繼今以往立政勿用憸利小人其惟用有常吉士使勉力以輔相我國家也呂氏曰君子陽類用則升其國於明昌小人隂類用則降其國於暗昧隂陽升降亦各從其類也今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫始言和我庶獄庶慎時則勿有間之繼言其勿誤于庶獄庶慎惟正是乂之至是獨曰其勿誤于庶獄惟有司之牧夫蓋刑者天下之重事挈其重而獨舉之使成王尤知刑獄之可畏必專有司牧夫之任而不可以已誤之也其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈詰治也治爾戎服兵器也陟升也禹迹禹服舊迹也方四方也海表四裔也言德威所及無不服也覲見也耿光德也大烈業也於文王稱德於武王稱業各於其盛者稱之呂氏曰兵刑之大也故既言庶獄而繼以治兵之戒焉或曰周公之訓稽其所弊得無啓後世好大喜功之患乎曰周公詰兵之訓繼勿誤庶獄之後犴獄之間尚恐一刑之誤况六師萬衆之命其敢不審而誤舉乎推勿誤庶獄之心而奉克詰戎兵之戒必非得已不已而輕用民命者也嗚呼繼自今後王立政其惟克用常人并周家後王而戒之也常人常德之人也臯陶曰彰厥有常吉哉常人與吉士同實而異名者也周公若曰太史司寇蘇公式敬爾由獄以長我王國兹式有慎以列用中罰此周公因言慎罰而以蘇公敬獄之事告之太史使其并書以為後世司獄之式也蘇國名也左傳蘇忿生以溫為司寇周公告太史以蘇忿生為司寇用能敬其所由之獄培植基本以長我王國令於此取法而有謹焉則能以輕重條列用其中罰而無過差之患矣書經集傳卷五

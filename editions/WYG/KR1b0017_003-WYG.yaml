body:
  text: 書經集傳卷三宋蔡沈撰商書契始封商湯因以為有天下之號書凡十七篇湯誓湯號也或曰諡湯名履姓子氏夏桀暴虐湯往征之亳衆憚於征役故湯諭以弔伐之意蓋師興之時而誓于亳都者也今文古文皆有王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之台音怡後同王曰者史臣追述之稱也格至台我稱舉也以人事言之則臣伐君可謂亂矣以天命言之則所謂天吏非稱亂也今爾有衆汝曰我后不恤我衆舍我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正穡刈穫也割斷也亳邑之民安於湯之徳政桀之虐焰所不及故不知夏氏之罪而憚伐桀之勞反謂湯不恤亳邑之衆舍我刈穫之事而斷正有夏湯言我亦聞汝衆論如此然夏桀暴虐天命殛之我畏上帝不敢不往正其罪也今汝其曰夏罪其如台夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪予及汝皆亡夏徳若茲今朕必往遏絶也割劓割夏邑之割時是也湯又舉商衆言桀雖暴虐其如我何湯又應之曰夏王率為重役以窮民力嚴刑以殘民生民厭夏徳亦率皆怠於奉上不和於國疾視其君指日而曰是日何時而亡乎若亡則吾寧與之俱亡蓋苦桀之虐而欲其亡之甚也桀之惡徳如此今我之所以必往也桀嘗自言吾有天下如天之有日日亡吾乃亡耳故民因以日目之爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不從誓言予則孥戮汝罔有攸赦賚與也食言言已出而反吞之也禹之征苗止曰爾尚一乃心力其克有勲至啓則曰用命賞于祖不用命戮于社予則孥戮汝此又益以朕不食言罔有攸赦亦可以觀世變矣仲虺之誥虺許偉反仲虺臣名奚仲之後為湯左相誥告也周禮士師以五戒先後刑罰一曰誓用之於軍旅二曰誥用之於會同以喩衆也此但告湯而亦謂之誥者唐孔氏謂仲虺亦必對衆而言蓋非特釋湯之慙而且以曉其臣民衆庶也古文有今文無成湯放桀于南巢惟有慙徳曰予恐來世以台為口實武功成故曰成湯南巢地名廬江六縣有居巢城桀奔于此因以放之也湯之伐桀雖順天應人然承堯舜禹授受之後於心終有所不安故愧其徳之不古若而又恐天下後世藉以為口實也陳氏曰堯舜以天下讓後世好名之士猶有不知而慕之者湯武征伐而得天下後世嗜利之人安得不以為口實哉此湯之所以恐也歟仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏徳民墜塗炭天乃錫王勇智表正萬邦纘禹舊服茲率厥典奉若天命仲虺恐湯憂愧不已乃作誥以解釋其意歎息言民生有耳目口鼻愛惡之欲無主則爭且亂矣天生聰明所以為之主而治其爭亂者也墜陷也塗泥炭火也桀為民主而反行昏亂陷民於塗炭既失其所以為主矣然民不可以無主也故天錫湯以勇智之徳勇足以有為智足以有謀非勇智則不能成天下之大業也表正者表正於此而影直於彼也天錫湯以勇智者所以使其表正萬邦而繼禹舊所服行也此但率循其典常以奉順乎天而已天者典常之理所自出而典常者禹之所服行者也湯革夏而纘舊服武革商而政由舊孔子所謂百世可知者正以是也林氏曰齊宣王問孟子曰湯放桀武王伐紂有諸孟子曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也夫立之君者懼民之殘賊而無以主之為之主而自殘賊焉則君之實喪矣非一夫而何孟子之言則仲虺之意也夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師矯與矯制之矯同誣罔臧善式用爽明師衆也天以形體言帝以主宰言桀知民心不從矯詐誣罔託天以惑其衆天用不善其所為用使有商受命用使昭明其衆庶也王氏曰夏有昏徳則衆從而昏商有明徳則衆從而明呉氏曰用爽厥師續下文簡賢附勢意不相貫疑有脱誤簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之徳言足聽聞秕卑履反簡略繁多肇始也戰戰恐懼貌言簡賢附勢之人同惡相濟寔多徒衆肇我邦於有夏為桀所惡欲見翦除如苗之有莠如粟之有秕鋤治簸揚有必不相容之勢商衆小大震恐無不懼陷于非罪况湯之徳言則足人之聽聞尤桀所忌疾者乎以苗栗喩桀以莠秕喩湯特言其不容於桀而迹之危如此史記言桀囚湯於夏臺湯之危屢矣無道而惡有道勢之必至也惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民懋與茂同邇近殖聚也不近聲色不聚貨利若未足以盡湯之徳然此本原之地非純乎天徳而無一毫人欲之私者不能也本原澄徹然後用人處已而莫不各得其當懋茂也繁多之意與時乃功懋哉之義同言人之懋於徳者則懋之以官人之懋於功者則懋之以賞用人惟已而人之有善者無不容改過不吝而已之不善者無不改不忌能於人不吝過於已合併為公私意不立非聖人其孰能之湯之用人處已者如此而於臨民之際是以能寛能仁謂之能者寛而不失於縱仁而不失於柔易曰寛以居之仁以行之君徳也君徳昭著而孚信於天下矣湯之徳足人聽聞者如此乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉葛國名伯爵也餉饋也仇餉與餉者為仇也葛伯不祀湯使問之曰無以供粢盛湯使亳衆往耕老弱饋餉葛伯殺其童子湯遂征之湯征自葛始也奚何徯待也蘇復生也西夷北狄言逺者如此則近者可知也湯師之未加者則怨望其來曰何獨後予其所往伐者則妻孥相慶曰待我后久矣后來我其復生乎他國之民皆以湯為我君而望其來者如此天下之愛戴歸往於商者非一日矣商業之興蓋不在於鳴條之役也呂氏曰夏商之際君臣易位天下之大變然觀其征伐之時唐虞都兪揖遜氣象依然若存蓋堯舜禹湯以道相傳世雖降而道不降也佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌前既釋湯之慙此下因以勸勉之也諸侯之賢徳者佑之輔之忠良者顯之遂之所以善善也侮説文曰傷也諸侯之弱者兼之昧者攻之亂者取之亡者傷之所以惡惡也言善則由大以及小言惡則由小以及大推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣徳日新萬邦惟懐志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小徳日新者日新其徳而不自已也志自滿者反是湯之盤銘曰苟日新日日新又日新其廣日新之義歟徳日新則萬邦雖廣而無不懐志自滿則九族雖親而亦離萬邦舉逺以見近也九族舉親以見疎也王其勉明大徳立中道於天下中者天下之所同有也然非君建之則民不能以自中而禮義者所以建中者也義者心之裁制禮者理之節文以義制事則事得其宜以禮制心則心得其正内外合徳而中道立矣如此非特有以建中於氏而垂諸後世者亦綽乎有餘裕矣然是道也必學焉而後至故又舉古人之言以為隆師好問則徳尊而業廣自賢自用者反是謂之自得師者眞知己之不足人之有餘委心聽順而無拂逆之謂也孟子曰湯之於伊尹學焉而後臣之故不勞而王其湯之所以自得者歟仲虺言懐諸侯之道推而至於修徳檢身又推而至於能自得師夫自天子至於庶人未有捨師而能成者雖生知之聖亦必有師焉後世之不如古非特世道之降抑亦師道之不明也仲虺之論遡流而源要其極而歸諸能自得師之一語其可為帝王之大法也歟嗚呼愼厥終惟其始殖有禮覆昏暴欽崇天道永保天命上文既勸勉之於是歎息言謹其終之道惟於其始圖之始之不謹而能謹終者未之有也伊尹亦言謹終于始事雖不同而理則一也欽崇者敬畏尊奉之意有禮者封殖之昏暴者覆亡之天之道也欽崇乎天道則永保其天命矣按仲虺之誥其大意有三先言天立君之意桀逆天命而天之命湯者不可辭次言湯徳足以得民而民之歸湯者非一日末言為君艱難之道人心離合之機天道福善禍淫之可畏以明今之受夏非以利己乃有無窮之恤以深慰湯而釋其慙仲虺之忠愛可謂至矣然湯之所慙恐來世以為口實者仲虺終不敢謂無也君臣之分其可畏如此哉湯誥湯伐夏歸亳諸侯率職來朝湯作誥以與天下更始今文無古文有王歸自克夏至于亳誕告萬方誕大也亳湯所都在宋州穀熟縣王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降衷于下民若有恒性克綏厥猷惟后皇大衷中若順也天之降命而具仁義禮智信之理無所偏􅀝所謂衷也人之稟命而得仁義禮智信之理與心俱生所謂性也猷道也由其理之自然而有仁義禮智信之行所謂道也以降衷而言則無有偏倚順其自然固有常性矣以稟受而言則不無清濁純雜之異故必待君師之職而後能使之安於其道也故曰克綏厥猷惟后夫天生民有欲以情言也上帝降衷于下民以性言也仲虺即情以言人之欲成湯原性以明人之善聖賢之論互相發明然其意則皆言君道之係於天下者如此之重也夏王滅德作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祗天道福善禍淫降災于夏以彰厥罪罹鄰知反荼音徒言桀無有仁愛但為殺戮天下被其凶害如荼之苦如毒之螫不可堪忍稱寃於天地鬼神以冀其拯己屈原曰人窮則反本故勞苦倦極未嘗不呼天也天之道善者福之淫者禍之桀既淫虐故天降災以明其罪意當時必有災異之事如周語所謂伊洛竭而夏亡之類肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命戮當作勠肆故也故我小子奉將天命明威不敢赦桀之罪也𤣥牡夏尚黑未變其禮也神后后土也聿遂也元聖伊尹也上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖孚允皆信也僭差也賁文之著也殖生也上天信佑下民故夏桀竄亡而屈服天命無所僭差燦然若草木之敷榮兆民信乎其生殖矣俾予一人輯寧爾邦家茲朕未知獲戾于上下慄慄危懼若將隕于深淵輯和戾罪隕墜也天使我輯寧爾邦家其付予之重恐不足以當之未知己得罪于天地與否驚恐憂畏若將墜於深淵蓋責愈重則憂愈大也凡我造邦無從匪彝無即慆淫各守爾典以承天休夏命已黜湯命維新侯邦雖舊悉與更始故曰造邦彝法即就慆慢也匪彝指法度言慆淫指逸樂言典常也各守其典常之道以承天之休命也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方簡閲也人有善不敢以不達已有罪不敢以自恕簡閲一聽於天然天以天下付之我則民之有罪實君所為君之有罪非民所致非特聖人厚於責己而薄於責人是乃理之所在君道當然也嗚呼尚克時忱乃亦有終忱時壬反忱信也歎息言庶幾能於是而忱信焉乃亦有終也呉氏曰此兼人已而言伊訓訓導也太甲嗣位伊尹作書訓導之史録為篇今文無古文有惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰伊尹乃明言烈祖之成徳以訓于王見形甸反夏曰嵗商曰祀周曰年一也元祀者太甲即位之元年十二月者商以建丑為正故以十二月為正也乙丑日也不繫以朔者非朔日也三代雖正朔不同然皆以寅月起數蓋朝覲㑹同頒厯授時則以正朔行事至於紀月之數則皆以寅為首也伊姓尹字也伊尹名摯祠者告祭於廟也先王湯也冢長也禮有冢子冢婦之名周人亦謂之冢宰古者王宅憂祠祭則冢宰攝而告廟又攝而臨羣臣太甲服仲壬之喪伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣后咸在百官總已之職以聽冢宰則攝而臨羣臣也烈功也商頌曰衎我烈祖太甲即位改元伊尹於祠告先王之際明言湯之成徳以訓太甲此史官敘事之始辭也或曰孔氏言湯崩踰月太甲即位則十二月者湯崩之年建子之月也豈改正朔而不改月數乎曰此孔氏惑於序書之文也太甲繼仲壬之後服仲壬之喪而孔氏曰湯崩奠殯而告固已誤矣至於改正朔而不改月數則於經史尤可考周建子矣而詩言四月維夏六月徂暑則寅月起數周未嘗改也秦建亥矣而史記始皇三十一年十二月更名臘曰嘉平夫臘必建丑月也秦以亥正則臘為三月云十二月者則寅月起數秦未嘗改也至三十七年書十月癸丑始皇出遊十一月行至雲夢繼書七月丙寅始皇崩九月葬酈山先書十月十一月而繼書七月九月者知其以十月為正朔而寅月起數未嘗改也且秦史制書謂改年始朝賀皆自十月朔夫秦繼周者也若改月數則周之十月為建酉月矣安在其為建亥乎漢初史氏所書舊例也漢仍秦正亦書曰元年冬十月則正朔改而月數不改亦已明矣且經曰元祀十有二月乙丑則以十二月為正朔而改元何疑乎惟其以正朔行事也故後乎此者復正厥辟亦以十二月朔奉嗣王歸于亳蓋祠告復政皆重事也故皆以正朔行之孔氏不得其説而意湯崩踰月太甲即位奠殯而告是以崩年改元矣蘇氏曰崩年改元亂世事也不客在伊尹而有之不可以不辯又按孔氏以為湯崩呉氏曰殯有朝夕之奠何為而致祠主喪者不離於殯側何待於祇見蓋太甲之為嗣王嗣仲壬而王也太甲太丁之子仲壬其叔父也嗣叔父而王而為之服三年之喪為之後者為之子也太甲既即位於仲壬之柩前方居憂於仲壬之殯側伊尹乃至商之祖廟徧祠商之先王而以立太甲告之不言太甲祠而言伊尹喪三年不祭也奉太甲徧見商之先王而獨言祇見厥祖者雖徧見先王而尤致意於湯也亦猶周公金縢之冊雖徧告三王而獨眷眷於文王也湯既已祔于廟則是此書初不廢外丙仲壬之事但此書本為伊尹稱湯以訓太甲故不及外丙仲壬之事爾餘見書序曰嗚呼古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寧暨鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳詩曰殷監不逺在夏后之世商之所宜監者莫近於夏故首以夏事告之也率循也假借也有命有天命者謂湯也桀不率循先王之道故天降災借手于我成湯以誅之夏之先后方其懋徳則天之眷命如此及其子孫弗率而覆亡之禍又如此太甲不知率循成湯之德則夏桀覆亡之禍亦可監矣哉始也鳴條夏所宅也亳湯所宅也言造可攻之釁者由桀積惡於鳴條而湯德之修則始於亳都也惟我商王布昭聖武代虐以寛兆民允懐布昭敷著也聖武猶易所謂神武而不殺者湯之德威敷著于天下代桀之虐以吾之寛故天下之民信而懐之也今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海初即位之初言始不可以不謹也謹始之道孝悌而已孝悌者人心之所同非必人人敎詔之立植也立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家達於國終而措之天下矣孔子曰立愛自親始敎民睦也立敬自長始敎民順也嗚呼先王肇修人紀從諫弗咈先民時若居上克明為下克忠與人不求備檢身若不及以至于有萬邦茲惟艱哉人紀三綱五常孝敬之實也上文欲太甲立其愛敬故此言成湯之所修人紀者如下文所云也綱常之理未嘗泯沒桀廢棄之而湯始修復之也咈逆也先民猶前輩舊德也從諫不逆先民是順非誠於樂善者不能也居上克明言能盡臨下之道為下克忠言能盡事上之心呂氏曰湯之克忠最為難看湯放桀以臣易君豈可為忠不知湯之心最忠者也天命未去人心未離事桀之心曷嘗斯須替哉與人之善不求其備檢身之誠有若不及其處上下人己之閒又如此是以德日以盛業日以廣天命歸之人心戴之由七十里而至于有萬邦也積累之勤茲亦難矣伊尹前既言夏失天下之易此又言湯得天下之難太甲可不思所以繼之哉敷求哲人俾輔于爾後嗣敷廣也廣求賢哲使輔爾後嗣也制官刑儆于有位曰敢有恒舞于宮酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟茲三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士殉松潤反逺于願反官刑官府之刑也巫風者常歌常舞若巫覡然也淫過也過而無度也比昵也倒置悖理曰亂好人之所惡惡人之所好也風風化也三風愆之綱也十愆風之目也卿士諸侯十有其一已喪其家亡其國矣墨墨刑也臣下而不能匡正其君則以墨刑加之具詳悉也童蒙始學之士則詳悉以是訓之欲其入官而知所以正諫也當時太甲欲敗度縱敗禮伊尹先見其微故拳拳及此劉侍講曰墨即叔向所謂夏書昏墨賊殺臯陶之刑貪以敗官為墨嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗歎息言太甲當以三風十愆之訓敬之於身念而勿忘也謨謂其謀言謂其訓洋大孔甚也言其謀訓大明不可忽也不常者丢就無定也為善則降之百祥為惡則降之百殃各以類應也勿以小善而不為萬邦之慶積於小勿以小惡而為之厥宗之墜不在大蓋善必積而後成惡雖小而可懼此總結上文而又以天命人事禍福申戒之也太甲上商史錄伊尹告戒節次及太甲往復之辭故三篇相屬成文其閒或附史臣之語以貫篇意若史家紀傳之所載也唐孔氏曰伊訓肆命徂后太甲咸有一德皆是告戒太甲不可皆名伊訓故隨事立稱也林氏曰此篇亦訓體今文無古文有惟嗣王不惠于阿衡惠順也阿倚衡平也阿衡商之官名言天下之所倚平也亦曰保衡或曰伊尹之號史氏錄伊尹之書先此以發之伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祇肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒監音鑑左音佐顧常目在之也諟古是字明命者上天顯然之理而命之我者在天為明命在人為明德伊尹言成湯常目在是天之明命以奉天地神祇社稷宗廟無不敬肅故天視其德用集大命以有天下撫安萬邦我又身能左右成湯以居民衆故嗣王得以大承其基業也惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祇爾厥辟辟不辟忝厥祖先見如字相去聲下同夏都安邑在亳之西故曰西邑夏周忠信也國語曰忠信為周施氏曰作偽心勞日拙則缺露而不周忠信則無偽故能周而無缺夏之先王以忠信有終故其輔相者亦能有終其後夏桀不能有終故其輔相者亦不能有終嗣王其以夏桀為戒哉當敬爾所以為君之道君而不君則忝辱成湯矣太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也王惟庸罔念聞庸常也太甲惟若尋常於伊尹之言無所念聽此史氏之言伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彦啓迪後人無越厥命以自覆昧晦爽明也昧爽云者欲明未明之時也丕大也顯亦明也先王於昧爽之時洗濯澡雪大明其德坐以待旦而行之也旁求者求之非一方也彦美士也言湯孜孜為善不遑寧處如此而又旁求俊彦之士以開導子孫太甲毋顚越其命以自取覆亡也愼乃儉德惟懐永圖太甲欲敗度縱敗禮蓋奢侈失之而無長逺之慮者伊尹言當謹其儉約之德惟懐永乆之謀以約失之者鮮矣此太甲受病之處故伊尹特言之若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭虞虞人也機弩才也括矢拈也度法度射者之所凖望者也釋發也言若虞人之射弩機既張必往察其括之合於法度然後發之則發無不中矣欽者肅恭收斂止見虞書率循也欽厥止者所以立本率乃祖者所以致用所謂省括于度則釋也王能如是則動無過舉近可以慰悦尹心逺可以有譽於後世矣安汝止者聖君之事生而知者也欽厥止者賢君之事學而知者也王未克變不能變其舊習也此亦史氏之言伊尹曰茲乃不義習與性成予弗狎于弗順營于桐宮密邇先王其訓無俾世迷狎習也弗順者不順義理之人也桐成湯墓陵之地伊尹指太甲所為乃不義之事習惡而性成者也我不可使其狎習不順義理之人於是營宮于桐使親近成湯之墓朝夕哀思興起其善以是訓之無使終身迷惑而不悟也王徂桐宮居憂克終允德徂往也允信也有諸已之謂信實有其德於身也凡人之不善必有從臾以導其為非者太甲桐宮之居伊尹既使其密邇先王陵墓興發其善心又絶其比昵之黨而革其汚染此其所以克終允德也次篇伊尹言嗣王克終厥德又曰允德協于下故史氏言克終允德結此篇以發次篇之意太甲中惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳太甲終喪明年之正朔也冕冠也唐孔氏曰周禮天子六冕備物盡文惟衮冕耳此蓋衮冕之服義或然也奉迎也喪既除以衮冕吉服奉迎以歸也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休民非君則不能相正以生君非民則誰與為君者言民固不可無君而君尤不可失民也太甲改過之初伊尹首發此義其喜懼之意深矣夫太甲不義有若性成一旦翻然改悟是豈人力所至蓋天命眷商隂誘其衷故嗣王能終其德也向也湯緒幾墜今其自是有永豈不為萬世無疆之休乎王拜手稽首曰予小子不明于德自底不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終逭胡玩反拜手首至手也稽首首至地也太甲致敬於師保其禮如此不類猶不肖也多欲則興作而亂法度縱肆則放蕩而隳禮儀度就事言之也禮就身言之也速召之急也戾罪孽災逭逃也既往已往也已往既不信伊尹之言不能謹之於始庶幾正救之力以圖惟其終也當太甲不惠阿衡之時伊尹之言惟恐太甲不聽及太甲改過之後太甲之心惟恐伊尹不言夫太甲固困而知之者然昔之迷今之復昔之晦今之明如日月昏蝕一復其舊而光采炫耀萬景俱新湯武不可及已豈居成王之下乎伊尹拜手稽首曰修厥身允德協于下惟明后伊尹致敬以復太甲也修身則無敗度敗禮之事允德則有誠身誠意之實德誠于上協和于下惟明后然也先王子惠困窮民服厥命罔有不悦並其有邦厥鄰乃曰徯我后后來無罰此言湯德所以協下者困窮之民若己子而惠愛之惠之若子則心之愛者誠矣未有誠而不動者也故民服其命無有不得其懽心當時諸侯並湯而有國者其鄰國之民乃以湯為我君曰待我君我君來其無罰乎言除其邪虐湯之得民心也如此即仲虺后來其蘇之事王懋乃德視乃烈祖無時豫怠湯之盤銘曰苟日新日日新又日新湯之所以懋其德者如此太甲亦當勉於其德視烈祖之所為不可頃刻而逸豫怠惰也奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁思孝則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽於淺近思聰則所聽者德而不惑於憸邪此懋德之所從事者太甲能是則我承王之美而無所厭斁也太甲下伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懐懐于有仁鬼神無常享享于克誠天位艱哉申誥重誥也天之所親民之所懐鬼神之所享皆不常也惟克敬有仁克誠而後天親之民懐之鬼神享之也曰敬曰仁曰誠者各因所主而言天謂之敬者天者理之所在動靜語黙不可有一毫之慢民謂之仁者民非元后何戴鰥寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立於此而後神格於彼三者所當盡如此人君居天之位其可易而為之哉分而言之則三合而言之一德而已太甲遷善未幾而伊尹以是告之其才固有大過人者歟德惟治否德亂與治同道罔不興與亂同事罔不亡終始愼厥與惟明明后治去聲否俯久反德者合敬仁誠之稱也有是德則治無是德則亂治固古人有行之者矣亂亦古人有行之者也與古之治者同道則無不興與古之亂者同事則無不亡治而謂之道者蓋治因時制宜或損或益事未必同而道則同也亂而謂之事者亡國喪家不過貨色遊畋作威殺戮等事事同道無不同也治亂之分顧所與如何耳始而與治固可以興終而與亂則亡亦至矣謹其所與終始如一惟明明之君為然也上篇言惟明后此篇言惟明明后蓋明其所已明而進乎前者矣先王惟時懋敬厥德克配上帝今王嗣有令緒尚監茲哉敬即克敬惟親之敬舉其一以包其二也成湯勉敬其德德與天合故克配上帝今王嗣有令緒庻幾其監視此也若升髙必自下若陟遐必自邇此告以進德之序也中庸論君子之道亦謂譬如行逺必自邇譬如登髙必自卑進德修業之喻未有如此之切者呂氏曰自此乃伊尹畫一以告太甲也無輕民事惟難無安厥位惟危無毋通毋輕民事而思其難毋安君位而思其危愼終于始人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宮之事往已今其即政臨民亦事之一初也有言逆于汝心必求諸道有言遜于汝志必求諸非道鯁直之言人所難受巽順之言人所易從於其所難受者必求諸道不可遽以逆于心而拒之於其所易從者必求諸非道不可遽以遜于志而聽之以上五事蓋欲太甲矯乎情之偏也嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何也弗慮何得欲其謹思之也弗為何成欲其篤行之也元大良善貞正也一人者萬邦之儀表一人元良則萬邦以正矣君罔以辯言亂舊政臣罔以寵利居成功邦其永孚于休弗思弗為安於縱弛先王之法廢矣能思能為作其聰明先王之法亂矣亂之為害甚於廢也成功非寵利之所可居者至是太甲德已進伊尹有退休之志矣此咸有一德之所以繼作也君臣各盡其道邦家永信其休美也呉氏曰上篇稱嗣王不惠于阿衡必其言有與伊尹背違者辯言亂政或太甲所失在此罔以寵利居成功己之所自處者己素定矣下語既非泛論則上語必有為而發也咸有一德伊尹致仕而去恐太甲德不純一及任用非人故作此篇亦訓體也史氏取其篇中咸有一德四字以為篇目今文無古文有伊尹既復政厥辟將告歸乃陳戒于德伊尹已還政太甲將告老而歸私邑以一德陳戒其君此史氏本序曰嗚呼天難諶命靡常常厥德保厥位厥德匪常九有以亡諶信也天之難信以其命之不常也然天命雖不常而常於有德者君德有常則天命亦常而保厥位矣君德不常則天命亦不常而九有以亡矣九有九州也夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正上文言天命無常惟有德則可常於是引桀之所以失天命湯之所以得天命者證之一德純一之德不雜不息之義即上文所謂常德也神主百神之主享當也湯之君臣皆有一德故能上當天心受天明命而有天下於是改夏建寅之正而為建丑正也非天私我有商惟天佑于一德非商求于下民惟民歸于一德上言一德故得天得民此言天佑民歸皆以一德之故蓋反復言之德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德二三則雜矣德之純則無往而不吉德而雜則無往而不凶僭差也惟吉凶不差在人者惟天之降災祥在德故也今嗣王新服厥命惟新厥德終始惟一時乃日新太甲新服天子之命德亦當新然新德之要在於有常而已終始有常而無閒斷是乃所以日新也任官惟賢才左右惟其人臣為上為德為下為民其難其愼惟和惟一賢者有德之稱才者能也左右者輔弼大臣非賢才之稱可盡故曰惟其人夫人臣之職為上為德左右厥辟也為下為民所以宅師也不曰君而曰德者兼君道而言也臣職所係其重如此是必其難其愼難者難於任用愼者愼於聽察所以防小人也惟和惟一和者可否相濟一者終始如一所以任君子也德無常師主善為師善無常主協于克一上文言用人因推取人為善之要無常者不可執一之謂師法協合也德者善之總稱善者德之實行一者其本原統會者也德兼衆善不主於善則無以得一本萬殊之理善原於一不協於一則無以達萬殊一本之妙謂之克一者能一之謂也博而求之於不一之善約而會之於至一之理此聖學始終條理之序與夫子所謂一貫者幾矣太甲至是而得與聞焉亦異乎常人之改過者歟張氏曰虞書精一數語之外惟此為精密俾萬姓咸曰大哉王言又曰一哉王心克綏先王之禄永底烝民之生人君惟其心之一故其發諸言也大萬姓見其言之大故能知其心之一感應之理自然而然以見人心之不可欺而誠之不可掩也禄者先王所守之天禄也烝衆也天禄安民生厚一德之效驗也嗚呼七世之廟可以觀德萬夫之長可以觀政長上聲天子七廟三昭三穆與太祖之廟七七廟親盡則遷必有德之主則不祧毁故曰七世之廟可以觀德天子居萬民之上必政敎有以深服乎人而後萬民悦服故曰萬夫之長可以觀政伊尹歎息言德政修否見於後世服乎當時有不可掩者如此后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功盡子忍在忍二反罔使罔事即上篇民非后罔克胥匡以生后非民罔以辟四方之意申言君民之相須者如此欲太甲不敢忽也無毋同伊尹又言君民之使事雖有貴賤不同至於取人為善則初無貴賤之閒蓋天以一理賦之於人散為萬善人君合天下之萬善而後理之一者可全也苟自大而狹人匹夫匹婦有一不得自盡於上則一善不備而民主亦無與成厥功矣伊尹於篇終致其警戒之意而言外之旨則又推廣其所謂一者如此蓋道體之純全聖功之極致也嘗因是言之以為精粹無雜者一也終始無閒者一也該括萬善者一也一者通古今達上下萬化之原萬事之榦語其理則無二語其運則無息語其體則并包而無所遺也咸有一德之書而三者之義悉備前乎伏羲堯舜禹湯後乎文武周公孔子同一揆也盤庚上盤庚陽甲之弟自祖乙都耿圯於河水盤庚欲遷于殷而大家世族安土重遷胥動浮言小民雖蕩析離居亦惑於利害不適有居盤庚喻以遷都之利不遷之害上中二篇未遷時言下篇既遷後言王氏曰上篇告羣臣中篇告庶民下篇告百官族姓左傳謂盤庚之誥實誥體也三篇今文古文皆有但今文三篇合為一盤庚遷于殷民不適有居率籲衆慼出矢言籲音喩殷在河南偃師適往籲呼矢誓也史臣言盤庚欲遷于殷民不肯往適有居盤庚率呼衆憂之人出誓言以喩之如下文所云也周氏曰商人稱殷自盤庚始自此以前惟稱商自盤庚遷都之後於是殷商兼稱或只稱殷也曰我王來既爰宅于茲重我民無盡劉不能胥匡以生卜稽曰其如台盡子忍反曰盤庚之言也劉殺也盤庚言我先王祖乙來都于耿固重我民之生非欲盡致之死也民適不幸蕩析離居不能相救以生稽之於卜亦曰此地無若我何言耿不可居決當遷也先王有服恪謹天命茲猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈服事也先王有事恪謹天命不敢違越先王猶不敢常安不常其邑于今五遷厥邦矣今不承先王而遷且不知上天之斷絶我命况謂其能從先王之大烈乎詳此言則先王遷徙亦必有稽卜之事仲丁河亶甲篇逸不可考矣五邦漢孔氏謂湯遷亳仲丁遷囂河亶甲居相祖乙居耿并盤庚遷殷為五邦然以下文今不承于古文勢考之則盤庚之前當自有五遷史記言祖乙遷邢或祖乙兩遷也若顚木之有由蘖天其永我命于茲新邑紹復先王之大業底綏四方蘖牙葛反又魚列反顚仆也由古文作㽕木生條也顚木譬耿由蘖譬殷也言今自耿遷殷若已仆之木而復生也天其將永我國家之命於殷以繼復先王之大業而致安四方乎盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸箴王命衆悉至于庭斆胡敎反斆敎服事箴規也耿地潟鹵墊隘而有沃饒之利故小民苦於蕩析離居而巨室則總于貨寳惟不利於小民而利於巨室故巨室不悦而胥動浮言小民眩於利害亦相與咨怨閒有能審利害之實而欲遷者則又往往為在位者之所排擊阻難不能自達於上盤庚知其然故其敎民必自在位始而其所以敎在位者亦非作為一切之法以整齊之惟舉先王舊常遷都之事以正其法度而已然所以正法度者亦非有他焉惟曰使在位之臣無或敢伏小人之所箴規焉耳蓋以民患潟鹵墊隘有欲遷而以言箴規其上者汝毋得遏絶而使不得自達也衆者臣民咸在也史氏將述下文盤庚之訓語故先發此王若曰格汝衆予告汝訓汝猷黜乃心無傲從康若曰者非盡當時之言大意若此也汝猷黜乃心者謀去汝之私心也無與毋同毋得傲上之命從己之安蓋傲上則不肯遷從康則不能遷二者所當黜之私心也此雖盤庚對衆之辭實為羣臣而發以斆民由在位故也古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變今汝聒聒起信險膚予弗知乃所訟逸過也盤庚言先王亦惟謀任舊人共政王播告之修則奉承于内而能不隱匿其指意故王用大敬之宣化于外又無過言以惑衆聽故民用大變今爾在内則伏小人之攸箴在外則不和吉言于百姓譊譊多言凡起信於民者皆險陂膚淺之説我不曉汝所言果何謂也詳此所謂舊人者世臣舊家之人非謂老成人也蓋沮遷都者皆世臣舊家之人下文人惟求舊一章可見非予自荒茲德惟汝含德不惕予一人予若觀火予亦拙謀作乃逸荒廢也逸過失也盤庚言非我輕易遷徙自荒廢此德惟汝不宣布德意不畏懼於我我視汝情明若觀火我亦拙謀不能制命而成汝過失也若網在綱有條而不紊若農服田力穡乃亦有秋紊亂也綱舉則目張喩下從上小從大申前無傲之戒勤於田畝則有秋成之望喩今雖遷徙勞苦而有永建乃家之利申前從康之戒汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德蘇氏曰商之世家大族造言以害遷者欲以苟悦小民為德也故告之曰是何德之有汝曷不去汝私心施實德于民與汝婚姻僚友乎勞而有功此實德也汝能勞而有功則汝乃敢大言曰我有積德曰積德云者亦指世家大族而言申前汝猷黜乃心之戒乃不畏戎毒于逺邇惰農自安不昬作勞不服田畝越其罔有黍稷戎大昬强也汝不畏沈溺大害於逺近而憚勞不遷如怠惰之農不强力為勞苦之事不事田畝安有黍稷之可望乎此章再以農喩申言從康之害汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及相時憸民猶胥顧于箴言其發有逸口矧予制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非予有咎恫音通燎盧皎反撲普卜反吉好也先惡謂惡之先也奉承恫痛相視也憸民小民也逸口過言也逸口尚可畏况我制爾生殺之命可不畏乎恐謂恐動之以禍患沈謂沈陷之於罪惡不可嚮邇其猶可撲滅者言其勢焰雖盛而殄滅之不難也靖安咎過也則惟爾衆自為不安非我有過也此章反復辯論申言傲上之害遲任有言曰人惟求舊器非求舊惟新任如林反遲任古之賢人蘇氏曰人舊則習器舊則敝當常使舊人用新器也今按盤庚所引其意在人惟求舊一句而所謂求舊者非謂老人但謂求人於世臣舊家云耳詳下文意可見若以舊人為老人又何侮老成人之有古我先王暨乃祖乃父胥及逸勤予敢動用非罰世選爾勞予不掩爾善茲予大享于先王爾祖其從與享之作福作災予亦不敢動用非德選須絹反與去聲胥相也敢不敢也非罰非所當罰也世非一世也勞勞于王家也掩蔽也言先王及乃祖乃父相與同其勞逸我豈敢動用非罰以加汝乎世簡爾勞不蔽爾善茲我大享于先王爾祖亦以功而配食於廟先王與爾祖父臨之在上質之在旁作福作災皆簡在先王與爾祖父之心我亦豈敢動用非德以加汝乎予告汝于難若射之有志汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽予一人之作猷難言謀遷徙之難也蓋遷都固非易事而又當時臣民傲上從康不肯遷徙然我志決遷若射者之必於中有不容但己者弱少之也意當時老成孤幼皆有言當遷者故戒其老成者不可侮孤幼者不可少之也爾臣各謀長逺其居勉出汝力以聽我一人遷徙之謀也無有逺邇用罪伐厥死用德彰厥善邦之臧惟汝衆邦之不臧惟予一人有佚罰用罪猶言為惡用德猶言為善也伐猶誅也言無有逺近親疎凡伐死彰善惟視汝為惡為善如何爾邦之善惟汝衆用德之故邦之不善惟我一人失罰其所當罰也凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔致告者使各相告戒也自今以往各敬汝事整齊汝位法度汝言不然罰及汝身不可悔也盤庚中盤庚作惟涉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民亶當旱反造七到反作起而將遷之辭殷在河南故涉河誕大亶誠也咸造皆至也勿䙝戒其毋得䙝慢也此史氏之言蘇氏曰民之弗率不以政令齊之而以話言曉之盤庚之仁也曰明聽朕言無荒失朕命荒廢也嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時承敬也蘇氏曰古謂過為浮浮之言勝也后既無不惟民之敬故民亦保后相與憂其憂雖有天時之災鮮不以人力勝之也林氏曰憂民之憂者民亦憂其憂罔不惟民之承憂民之憂也保后胥慼民亦憂其憂也殷降大虐先王不懐厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰比毘至反先王以天降大虐不敢安居其所興作視民利當遷而已爾民何不念我以所聞先王之事凡我所以敬汝使汝者惟喜與汝同安爾非為汝有罪比于罰而謫遷汝也予若籲懐茲新邑亦惟汝故以丕從厥志我所以招呼懐來于此新邑者亦惟以爾民蕩析離居之故欲承汝俾汝康共以大從爾志也或曰盤庚遷都民咨胥怨而此以為丕從厥志何也蘇氏曰古之所謂從衆者非從其口之所不樂而從其心之所不言而同然者夫趨利而避害捨危而就安民心同然也殷亳之遷實斯民所利特其一時為浮言摇動怨咨不樂使其即安危利害之實而反求其心則固其所大欲者矣今予將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載爾忱不屬惟胥以沈不其或稽自怒曷瘳忱時任反乘平聲瘳丑鳩反上文言先王惟民之承而民亦保后胥慼今我亦惟汝故安定厥邦而汝乃不憂我心之所困乃皆不宣布腹心欽念以誠感動於我爾徒為此紛紛自取窮苦譬乘舟不以時濟必敗壊其所資今汝從上之誠閒斷不屬安能有濟惟相與以及沈溺而已詩曰其何能淑載胥及溺正此意也利害若此爾民而罔或稽察焉是雖怨疾忿怒何損於困苦乎汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上汝不為長久之謀以思其不遷之災是汝大以憂而自勸也孟子曰安其危而利其災樂其所以亡勸憂之謂也有今猶言有今日也罔後猶言無後日也上天也今其有今罔後是天斷棄汝命汝有何生理於天乎下文言迓續乃命于天蓋相首尾之辭今予命汝一無起穢以自臭恐人倚乃身迂乃心迂雲居反爾民當一心以聽上無起穢惡以自臭敗恐浮言之人倚汝之身迂汝之心使汝邪僻而無中正之見也予迓續乃命于天予豈汝威用奉畜汝衆畜許六反我之所以遷都者正以迎續汝命于天予豈以威脅汝哉用以奉養汝衆而已予念我先神后之勞爾先予丕克羞爾用懐爾然神后先王也羞養也即上文畜養之意言我思念我先神后之勞爾先人我大克羞養爾者用懐念爾故也失于政陳于茲髙后丕乃崇降罪疾曰曷虐朕民陳久崇大也耿圯而不遷以病我民是失政而久于此也髙后湯也湯必大降罪疾於我曰何為而虐害我民蓋人君不能為民圖安是亦虐之也汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕幼孫有比故有爽德自上其罰汝汝罔能迪比毘至反樂生興事則其生也厚是謂生生先后泛言商之先王也幼孫盤庚自稱之辭比同事也爽失也言汝民不能樂生興事與我同心以遷我先后大降罪疾於汝曰汝何不與朕幼小之孫同遷乎故汝有失德自上其罰汝汝無道以自免也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死戕慈良反斷都管反既勞乃祖乃父者申言勞爾先也汝共作我畜民者汝皆為我所畜之民也戕害也綏懐來之意謂汝有戕害在汝之心我先后固已知之懐來汝祖汝父汝祖汝父亦斷棄汝不救汝死也茲予有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥亂治也具多取而兼有之謂言若我治政之臣所與共天位者不以民生為念而務富貝玉者其祖父亦告我成湯作丕刑于其子孫啓成湯丕乃崇降弗祥而不赦也此章先儒皆以為責臣之辭然詳其文勢曰茲予有亂政同位則亦對民庶責臣之辭非直為羣臣言也按上四章言君有罪民有罪臣有罪我髙后與爾民臣祖父一以義斷之無所赦也王氏曰先王設敎因俗之善而導之反俗之惡而禁之方盤庚時商俗衰士大夫棄義即利故盤庚以具貝玉為戒此反其俗之惡而禁之者也自成周以上莫不事死如事生事亡如事存故其俗皆嚴鬼神以經考之商俗為甚故盤庚特稱先后與臣民之祖父崇降罪疾為告此因其俗之善而導之者也嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心告汝不易即上篇告汝于難之意大恤大憂也今我告汝以遷都之難汝當永敬我之所大憂念者君民一心然後可以有濟苟相絶逺而誠不屬則殆矣分猷者分君之所圖而共圖之分念者分君之所念而共念之相從相與也中者極至之理各以極至之理存于心則知遷徙之議為不可易而不為浮言横議之所動摇也乃有不吉不迪顚越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于茲新邑易夷益反種之勇反乃有不善不道之人顚隕踰越不恭上命者及暫時所遇為姦為宄劫掠行道者我小則加以劓大則殄滅之無有遺育毋使移其種于此新邑也遷徙道路艱關恐姦人乗隙生變故嚴明號令以告勑之往哉生生今予將試以汝遷永建乃家往哉往新邑也方遷徙之時人懐舊土之念而未見新居之樂故再以生生勉之振起其怠惰而作其趨事也試用也今我將用汝遷永立乃家為子孫無窮之業也盤庚下盤庚既遷奠厥攸居乃正厥位綏爰有衆盤庚既遷新邑定其所居正君臣上下之位慰勞臣民遷徙之勞以安有衆之情也此史氏之言曰無戲怠懋建大命曰盤庚之言也大命非常之命也遷國之初臣民上下正當勤勞盡瘁趨事赴功以為國家無窮之計故盤庚以無戲怠戒之以建大命勉之今予其敷心腹腎腸歴告爾百姓于朕志罔罪爾衆爾無共怒協比讒言予一人腎是忍反比毘至反歴盡也百姓畿内民庶百官族姓亦在其中古我先王將多于前功適于山用降我凶德嘉績于朕邦古我先王湯也適于山往于亳也契始居亳其後屢遷成湯欲多于前人之功故復往居亳按立政三亳鄭氏曰東成臯南轘轅西降谷以亳依山故曰適于山也降下也依山地髙水下而無河圮之患故曰用下我凶德嘉績美功也今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷今耿為河水圯壊沈溺墊隘民用蕩析離居無有定止將陷於凶德而莫之救爾謂我何故震動萬民以遷也肆上帝將復我髙祖之德亂越我家朕及篤敬恭承民命用永地于新邑乃上天將復我成湯之德而治及我國家我與一二篤敬之臣敬承民命用長居于此新邑也肆予沖人非廢厥謀弔由靈各非敢違卜用宏茲賁沖童弔至由用靈善也宏賁皆大也言我非廢爾衆謀乃至用爾衆謀之善者指當時臣民有審利害之實以為當遷者言也爾衆亦非敢固違我卜亦惟欲宏大此大業爾言爾衆亦非有他意也蓋盤庚於既遷之後申彼此之情釋疑懼之意明吾前日之用謀略彼既往之傲惰委曲忠厚之意藹然於言辭之表大事以定大業以興成湯之澤於是而益永盤庚其賢矣哉嗚呼邦伯師長百執事之人尚皆隱哉隱痛也盤庚復歎息言爾諸侯公卿百執事之人庶幾皆有所隱痛於心哉予其懋簡相爾念敬我衆相爾雅曰導也我懋勉簡擇導汝以念敬我之民衆也朕不肩好貨敢恭生生鞠人謀人之保居敘欽肩任敢勇也鞠人謀人未詳或曰鞠養也我不任好賄之人惟勇於敬民以其生生為念使鞠人謀人之保居者吾則敘而用之欽而禮之也今我既羞告爾于朕志若否罔有弗欽否俯九反羞進也若者如我之意即敢恭生生之謂否者非我之意即不肩好貨之謂二者爾當深念無有不敬我所言也無總于貨寳生生自庸無母同總聚也庸民功也此則􅀡戒其所不可為勉其所當為也式敷民德永肩一心式敬也敬布為民之德永任一心欲其久而不替也盤庚篇終戒勉之意一節嚴於一節而終以無窮期之盤庚其賢矣哉蘇氏曰民不悦而猶為之先王未之有也祖乙圯於耿盤庚不得不遷然使先王處之則動民而民不懼勞民而民不怨盤庚德之衰也其所以信於民者未至故紛紛如此然民怨誹逆命而盤庚終不怒引咎自責益開衆言反復告諭以口舌代斧鉞忠厚之至此殷之所以不亡而復興也後之君子厲民以自用者皆以盤庚藉口予不可以不論説命上説命記髙宗命傅説之言命之曰以下是也猶蔡仲之命微子之命後世命官制詞其原蓋出於此上篇記得説命相之辭中篇記説為相進戒之辭下篇記説論學之辭總謂之命者髙宗命説實三篇之綱領故總稱之今文無古文有王宅憂亮隂三祀既免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令亮龍張反隂鳥含反亮亦作諒隂古作闇按喪服四制髙宗諒隂三年鄭氏註云諒古作梁楣謂之梁闇讀如鶉䳺之䳺闇謂廬也即倚廬之廬儀禮翦屏柱楣鄭氏謂柱楣所謂梁闇是也宅憂亮隂言宅憂於梁闇也先儒以亮隂為信默不言則於諒隂三年不言為語復而不可解矣君薨百官總已聽於冢宰居憂亮隂不言禮之常也髙宗喪父小乙惟既免喪而猶弗言羣臣以其過於禮也故咸諫之歎息言有先知之德者謂之明哲明哲實為法於天下今天子君臨萬邦百官皆奉承法令王言則為命不言則臣下無所稟令矣王庸作書以誥曰以台正于四方台恐德弗類茲故弗言恭默思道夢帝賚予良弼其代予言庸用也髙宗用作書告喩羣臣以不言之意言以我表正四方任大責重恐德不類于前人故不敢輕易發言惟恭敬淵黙以思治道夢帝與我賢輔其將代我言矣蓋髙宗恭黙思道之心純一不二與天無閒故夢寐之閒帝賚良弼其念慮所孚精神所格非偶然而得者也乃審厥象俾以形旁求于天下説築傅巖之野惟肖審詳也詳所夢之人繪其形象旁求于天下旁求者求之非一方也築居也今言所居猶謂之卜築傅巖在虞虢之閒肖似也與所夢之形相似爰立作相王置諸其左右於是立以為相按史記髙宗得説與之語果聖人乃舉以為相書不言省文也未接語而遽命相亦無此理置諸左右蓋以冢宰兼師保也荀卿曰學莫便乎近其人置諸左右者近其人以學也史臣將記髙宗命説之辭先敘事始如此命之曰朝夕納誨以輔台德此下命説之辭朝夕納誨者無時不進善言也孟子曰人不足與適也政不足與閒也惟大人為能格君心之非髙宗既相説處之以師𫝊之職而又命之朝夕納誨以輔台德可謂知所本矣呂氏曰髙宗見道明故知頃刻不可無賢人之言若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨三日雨為霖髙宗託物以喩望説納誨之切三語雖若一意然一節深一節也啓乃心沃朕心啓開也沃灌溉也啓乃心者開其心而無隱沃朕心者溉我心而厭飫也若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷瞑眠見反眩熒絹反跣蘇典反方言曰飲藥而毒海岱之閒謂之瞑眩瘳愈也弗瞑眩喩臣之言不苦口也弗視地喩我之行無所見也惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民辟必益反匡正率循也先王商先哲王也説既作相總百官則卿士而下皆其僚屬髙宗欲傅説暨其僚屬同心正救使循先王之道蹈成湯之迹以安天下之民也嗚呼欽予時命其惟有終敬我是命其思有終也是命上文所命者説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命答欽予時命之語木從繩喩后從諫明諫之決不可不受也然髙宗當求受言於己不必責進言於臣君果從諫臣雖不命猶且承之况命之如此誰敢不敬順其美命乎説命中惟説命總百官説受命總百官冢宰之職也乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民后王天子也君公諸侯也治亂曰亂明王奉順天道建邦設都立天子諸侯承以大夫師長制為君臣上下之禮以尊臨卑以下奉上非為一人逸豫之計而已也惟欲以治民焉耳惟天聰明惟聖時憲惟臣欽若惟民從乂天之聰明無所不聞無所不見無他公而已矣人君法天之聰明出於公則臣敬順而民亦從治矣一惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒茲允茲克明乃罔不休胄􅀡又反言語所以文身也輕出則有起羞之患甲胄所以衞身也輕動則有起戎之憂二者所以為己當慮其患於人也衣裳所以命有德必謹於在笥者戒其有所輕予干戈所以計有罪必嚴於省躬者戒其有所輕動二者所以加人當審其用於己也王惟戒此四者信此而能明焉則政治無不休美矣惟治亂在庶官官不及私昵惟其能爵罔及惡德惟其賢昵尼亦反庶官治亂之原也庶官得其人則治不得其人則亂王制曰論定而後官之任官而後爵之六卿百執事所謂官也公卿大夫士所謂爵也官以任事故曰能爵以命德故曰賢惟賢惟能所以治也私昵惡德所以亂也按古者公侯伯子男爵之於侯國公卿大夫士爵之於朝廷此言庶官則爵為公卿大夫士也呉氏曰惡德猶凶德也人君當用吉士凶德之人雖有過人之才爵亦不可及慮善以動動惟厥時善當乎理也時時措之宜也慮固欲其當乎理然動非其時猶無益也聖人酬酢斯世亦其時而已有其善喪厥善矜其能喪厥功自有其善則己不加勉而德􅉛矣自矜其能則人不効力而功隳矣惟事事乃其有備有備無患惟事其事乃其有備有備故無患也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能為之憂簡稼器修稼政事乎農事則農有其備故水旱不能為之害所謂事事有備無患者如此無啓寵納侮無恥過作非毋開寵幸而納人之侮毋恥過誤而遂己之非過誤出於偶然作非出於有意惟厥攸居政事惟醇居止而安之義安於義理之所止也義理出於勉强則猶二也義理安於自然則一矣一故政事醇而不雜也黷于祭祀時謂弗欽禮煩則亂事神則難黷徒谷反祭不欲黷黷則不敬禮不欲煩煩則擾亂皆非所以交鬼神之道也商俗尚鬼髙宗或未能脱於流俗事神之禮必有過焉祖己戒其祀無豐昵傅説蓋因其失而正之也王曰旨哉説乃言惟服乃不良于言予罔聞于行旨美也古人於飲食之美者必以旨言之蓋有味其言也服行也髙宗贊美説之所言謂可服行使汝不善於言則我無所聞而行之也蘇氏曰説之言譬如藥石雖散而不一然一言一藥皆足以治天下之公患所謂古之立言者説拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟説不言有厥咎髙宗方味説之所言而説以為得於耳者非難行於身者為難王忱信之亦不為難信可合成湯之成德説於是而猶有所不言則有其罪矣上篇言后克聖臣不命其承所以廣其從諫之量而將告以為治之要也此篇言允協先王成德惟説不言有厥咎所以責其躬行之實將進其為學之説也皆引而不發之義説命下王曰來汝説台小子舊學于甘盤既乃遯于荒野入宅于河自河徂亳暨厥終罔顯甘盤臣名君奭言在武丁時則有若甘盤遯退也髙宗言我小子舊學于甘盤已而退于荒野後又入居于河自河徂亳遷徙不常歴敘其廢學之因而歎其學終無所顯明也無逸言髙宗舊勞于外爰暨小人與此相應國語亦謂武丁入于河自河徂亳唐孔氏曰髙宗為王子時其父小乙欲其知民之艱苦故使居民閒也蘇氏謂甘盤遯于荒野以台小子語脉推之非是爾惟訓于朕志若作酒醴爾惟麴糵若作和羹爾惟鹽梅爾交修予罔予棄予惟克邁乃訓心之所之謂之志邁行也范氏曰酒非麴糵不成羹非鹽梅不和人君雖有美質必得賢人輔導乃能成德作酒者麴多則太苦糵多則太甘麴糵得中然後成酒作羹者鹽過則鹹梅過則酸鹽梅得中然後成羹臣之於君當以柔濟剛可濟否左右規正以成其德故曰爾交修予爾無我棄我能行爾之言也孔氏曰交者非一之義説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞求多聞者資之人學古訓者反之己古訓者古先聖王之訓載修身治天下之道二典三謨之類是也説稱王而告之曰人求多聞者是惟立事然必學古訓深識義理然後有得不師古訓而能長治久安者非説所聞甚言無此理也林氏曰傅説稱王而告之與禹稱舜曰帝光天之下文勢正同惟學遜志務時敏厥修乃來允懐于茲道積于厥躬遜謙抑也務專力也時敏者無時而不敏也遜其志如有所不能敏於學如有所不及虚以受人勤以勵己則其所修如泉始達源源乎其來矣茲此也篤信而深念乎此則道積於身不可以一二計矣夫修之來來之積其學之得於己者如此惟斆學半念終始典于學厥德脩罔覺斆胡敎反斆敎也言敎人居學之半蓋道積厥躬者體之立斆學于人者用之行兼體用合内外而後聖學可全也始之自學學也終之敎人亦學也一念終始常在於學無少閒斷則德之所修有不知其然而然者矣或曰受敎亦曰斆斆於為學之道半之半須自得此説極為新巧但古人論學語皆平正的實此章句數非一不應中閒一語獨爾巧險此蓋後世釋敎機權而誤以論聖賢之學也監于先王成憲其永無愆憲法愆過也言德雖造於罔覺而法必監于先王先王成法者子孫之所當守者也孟子言遵先王之法而過者未之有也亦此意惟説式克欽承旁招俊乂列于庶位式用也言髙宗之德苟至於無愆則説用能敬承其意廣求俊乂列于衆職蓋進賢雖大臣之責然髙宗之德未至則雖欲進賢有不可得者王曰嗚呼説四海之内咸仰朕德時乃風風敎也天下皆仰我德是汝之敎也股肱惟人良臣惟聖手足備而成人良臣輔而君聖髙宗初以舟楫霖雨為喩繼以麴糵鹽梅為喩至此又以股肱惟人為喩其所造益深所望益切矣昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時予之辜佑我烈祖格于皇天爾尚明保予罔俾阿衡專美有商先正先世長官之臣保安也保衡猶阿衡作興起也撻于市恥之甚也不獲不得其所也髙宗舉伊尹之言謂其自任如此故能輔我成湯功格于皇天爾庶幾明以輔我無使伊尹專美于我商家也傅説以成湯望髙宗故曰協于先王成德監于先王成憲髙宗以伊尹望傅説故曰罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命君非賢臣不與共治賢非其君不與共食言君臣相遇之難如此克者責望必能之辭敢者自信無慊之辭對者對以己揚者揚於衆休命上文髙宗所命也至是髙宗以成湯自期傅説以伊尹自任君臣相勉勵如此異時髙宗為商令王傅説為商賢佐果無愧於成湯伊尹也宜哉髙宗肜日髙宗肜祭有雊雉之異祖己訓王史氏以為篇亦訓體也不言訓者以既有髙宗之訓故只以篇首四字為題今文古文皆有髙宗肜日越有雊雉肜音融雊居候反肜祭明日又祭之名殷曰肜周曰繹雊鳴也於肜日有雊雉之異蓋祭禰廟也序言湯廟者非是祖己曰惟先格王正厥事格正也猶格其非心之格詳下文髙宗祀豐于昵昵者禰廟也豐於昵失禮之正故有雊雉之異祖己自言當先格王之非心然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言也乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命監音鑑夭於兆反典主也義者理之當然行而宜之之謂言天監視下民其禍福予奪惟主義如何爾降年有永有不永者義則永不義則不永非天夭折其民民自以非義而中絶其命也意髙宗之祀必有祈年請命之事如漢武帝五畤杞之類祖己言永年之道不在禱祠在於所行義與不義而已禱祠非永年之道也言民而不言君者不敢斥也民有不若德不聽罪天既孚命正厥德乃曰其如台不若德不順於德不聽罪不服其罪謂不改過也孚命者以妖孽為符信而譴告之也言民不順德不服罪天既以妖孽為符信而譴告之欲其恐懼修省以正德民乃曰孽祥其如我何則天必誅絶之矣祖己意謂髙宗當因雊雉以自省不可謂適然而自恕夫數祭豐昵徼福於神不若德也黷於祭祀傅説嘗以進戒意或吝改不聽罪也雊雉之異是天既孚命正厥德矣其可謂妖孽其如我何邪嗚呼王司敬民罔非天𦙍典祀無豐于昵司主𦙍嗣也王之職主於敬民而已徼福於神非王之事也况祖宗莫非天之嗣主祀其可獨豐於昵廟乎西伯戡黎戡音堪西伯文王也名昌姓姬氏戡勝也黎國名在上黨壺關之地按史記文王脱羑里之囚獻洛西之地紂賜弓矢鈇鉞使得專征伐為西伯文王既受命黎為不道於是舉兵伐而勝之祖伊知周德日盛既已戡黎紂惡不悛勢必及殷故恐懼奔告于王庶幾王之改之也史錄其言以為此篇誥體也今文古文皆有或曰西伯武王也史記嘗載紂使膠鬲觀兵膠鬲問之曰西伯曷為而來則武王亦繼文王為西伯矣西伯既戡黎祖伊恐奔告于王下文無及戡黎之事史氏特標此篇首以見祖伊告王之因也祖姓伊名祖己後也奔告自其邑奔走來告紂也曰天子天既訖我殷命格人元龜罔敢知吉非先王不相我後人惟王淫戲用自絶祖伊將言天訖殷命故特呼天子以感動之訖絶也格人猶言至人也格人元龜皆能先知吉凶者言天既已絶我殷命格人元龜皆無敢知其吉者甚言凶禍之必至也非先王在天之靈不佑我後人我後人淫戲用自絶於天耳故天棄我不有康食不虞天性不迪率典康安虞度也典常法也紂自絶於天故天棄殷不有康食饑饉荐臻也不虞天性民失常心也不迪率典廢壊常法也今我民罔弗欲喪曰天曷不降威大命不摯今王其如台大命非常之命摯至也史記云大命胡不至民苦紂虐無不欲殷之亡曰天何不降威於殷而受大命者何不至乎今王其無如我何言紂不復能君長我也上章言天棄殷此章言民棄殷祖伊之言可謂痛切明著矣王曰嗚呼我生不有命在天紂嘆息謂民雖欲亡我我之生獨不有命在天乎祖伊反曰嗚呼乃罪多參在上乃能責命于天參倉含反紂既無改過之意祖伊退而言曰爾罪衆多參列在上乃能責其命於天邪呂氏曰責命於天惟與天同德者方可殷之即喪指乃功不無戮于爾邦功事也言殷即喪亡矣指汝所為之事其能免戮於商邦乎蘇氏曰祖伊之諫盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主有不如紂者多矣愚讀是篇而知周德之至也祖伊以西伯戡黎不利於殷故奔告於紂意必及西伯戡黎不利於殷之語而入以告后出以語人未嘗有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣祖伊殷之賢臣也知周之興必不利於殷又知殷之亡初無與於周故因戡黎告討反覆乎天命民情之可畏而略無及周者文武公天下之心於是可見微子微國名子爵也微子名啓帝乙長子紂之庶母兄也微子痛殷之將亡謀於箕子比干史錄其問答之語亦誥體也以篇首有微子二字因以名篇今文古文皆有微子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗于酒用亂敗厥德于下酗吁句反父師太師三公箕子也少師孤卿比干也弗或者不能或如此也亂治也言紂無道無望其能治正天下也底致陳列也我祖成湯致功陳列于上而子孫沈酗于酒敗亂其德于下沈酗言我而不言紂者過則歸己猶不忍斥言之也殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恒獲小民方興相為敵讎今殷其淪喪若渉大水其無津涯殷遂喪越至于今殷之人民無小無大皆好草竊姦宄上而卿士亦皆相師非法上下容隱凡有冒法之人無有得其罪者小民無所畏懼强凌弱衆暴寡方起讎怨爭鬬侵奪綱紀蕩然淪喪之形茫無畔岸若涉大水無有津涯殷之喪亡乃至於今日乎微子上陳祖烈下述喪亂哀怨痛切言有盡而意無窮數千載之下猶使人傷感悲憤後世人主觀此亦可深監矣曰父師少師我其發出狂吾家耄遜于荒今爾無指告予顚隮若之何其出尺類反隮牋西反曰者微子更端之辭也何其語辭言紂發出顚狂暴虐無道我家老成之人皆逃遁于荒野危亡之勢如此今爾無所指示告我以顚隕隮墮之事將若之何哉蓋微子憂危之甚特更端以問救亂之策言我而不言紂者亦上章我用沈酗之義父師若曰王子天毒降災荒殷邦方興沈酗于酒此下箕子之答也王子微子也自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻天疾威敷于下土意同方興者言其方興而未艾也此答微子沈酗于酒之語而有甚之之意下同乃罔畏畏咈其耇長舊有位人乃罔畏畏者不畏其所當畏也孔子曰君子有三畏畏天命畏大人畏聖人之言咈逆也耇長老成之人也紂惟不畏其所當畏故老成舊有位者紂皆咈逆而棄逐之即武王所謂播棄黎老者此答微子發狂耄遜之語以上文特發問端故此先答之今殷民乃攘竊神祇之犧牷牲用以容將食無災攘如羊反牷音全色純曰犧體完曰牷牛羊豕曰牲犧牷牲祭祀天地之物禮之最重者猶為商民攘竊而去有司用相容隱將而食之且無災禍豈特草竊姦宄而已哉此答微子草竊姦宄之語降監殷民用乂讎斂召敵讎不怠罪合于一多瘠罔詔讎斂若仇敵掊斂之也不怠力行而不息也詔告也下視殷民凡上所用以治之者無非讎斂之事夫上以讎而斂下則下必為敵以讎上下之敵讎實上之讎斂以召之而紂方且召敵讎不怠君臣上下同惡相濟合而為一故民多饑殍而無所告也此答微子小民相為敵讎之語商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顚隮商今其有災我出當其禍敗商若淪喪我斷無臣僕他人之理詔告也告微子以去為道蓋商祀不可無人微子去則可以存商祀也刻害也箕子舊以微子長且賢勸帝乙立之帝乙不從卒立紂紂必忌之是我前日所言適以害子子若不去則禍必不免我商家宗祀始隕墜而無所托矣箕子自言其義決不可去而微子之義決不可不去也此答微子淪喪顚隮之語自靖人自獻于先王我不顧行遯上文既答微子所言至此則告以彼此去就之義靖安也各安其義之所當盡以自達其志於先王使無愧於神明而已如我則不復顧行遯也按此篇微子謀於箕子比干箕子答如上文而比干獨無所言者得非比干安於義之當死而無復言歟孔子曰殷有三仁焉三仁之行雖不同而皆出乎天理之正各得其心之所安故孔子皆許之以仁而所謂自靖者即此也又按左傳楚克許許男面縳銜璧衰絰輿櫬以見楚子楚子問諸逢伯逢伯曰昔武王克商微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之然則微子適周乃在克商之後而此所謂去者特去其位而逃遯於外耳論微子之去者當詳於是書經集傳卷三

front:
  text: 欽定四庫全書經部二
  hash: sha256:0cc932f81e16f40609470aaa0474e8369dec60a220254d8de2f21651552b055d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0017_WYG_000-1a, image: WYG0058/WYG0058-0001a.png}
body:
  text: 書集傳書類提要臣等謹案書集傳六卷宋蔡沈撰沈字仲默號九峯建陽人元定之子也事迹附載宋史元定傳慶元己未朱子屬沈作書傳至嘉定己巳書成案此據自序年月真德秀作沈墓志稱數十年然後克成蓋誤衍一數字淳祐中其子杭表進於朝稱集傳六卷小序一卷朱熹問答一卷繕寫成十二册其問答一卷久佚董鼎書傳纂注稱淳祐經進本録朱子與蔡仲默帖及語録數段今各類入綱領輯録內是其文猶散見鼎書中其條目則不復可考小序一卷沈亦逐條辨駁如朱子之攻詩序今其文猶存而書肆本皆削去不刊考朱升尚書旁注稱古文書序自為一篇孔注移之各冠篇首蔡氏刪之而置於後以存其舊蓋朱子所授之旨案陳振孫書録解題載朱子書古經四卷序一卷則此本乃朱子所定先有成書升以為所授之旨蓋偶未考是元末明初刊本尚連小序然宋史藝文志所著録者亦止六卷則似自宋以來即惟以集傳單行矣元何異孫十一經問對稱吉州所刊蔡傳仍以書序置之各篇初不害其蔡傳蓋一家之板本非通例也沈序稱二典三謨經朱子點定然董鼎纂注於正月朔旦條下注曰朱子親集書傳自孔序止此其他大義悉口授蔡氏併親稿百餘段俾足成之則大禹謨猶未全竣序所云二典三謨特約舉之詞鼎又引陳櫟之言曰案櫟此條不載所作書傳纂疏中蓋其書傳折衷之文也朱子訂傳原本有曰正月次年正月也神宗説者以為舜祖顓頊而宗堯因以神宗為堯廟未知是否如帝之初等蓋未嘗質言為堯廟今本云云其朱子後自改乎抑蔡氏所改乎則序所謂朱子點定者亦不免有所竄易故宋末黃景昌等各有正誤辨疑之作陳櫟董鼎金履祥皆篤信朱子之學者而櫟作書傳折衷鼎作書傳纂疏履祥作尚書表注皆斷斷有詞明洪武中修書傳會選改定至六十六條國朝欽定書經傳説彚纂亦多所考訂釐正蓋在朱子之説尚書主於通所可通而闕其所不可通見於語録者不啻再三而沈於殷盤周誥一一必求其解其不能無憾也固宜然其疏通證明較為簡易且淵源有自大體終醇元與古注疏並立學官見元史選舉志而人置注疏肄此書明與夏僎解並立學官見楊慎丹鉛録而人亦置僎解肄此書固有由矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書經集傳序慶元宋寧宗年號己未冬先生文公令平聲沈作書集傳去聲明年先生殁又十年始克成編總若干萬言嗚呼書豈易音異言哉二帝堯舜三王禹湯文武治平聲澄之反鄒氏季友曰治字本平聲借用乃為去聲故陸氏於諸經中平聲者並無音去聲者乃音直吏反而讀者不察乃或皆作去聲讀之今二聲並音以矯其弊平聲者修理其事方用其力也去聲者事有條理已見其效也諸篇中有不及盡音者以此推之皆可見矣天下之大經大法皆載此書而淺見薄識豈足以盡發藴奧且生於數千載之下而欲講明於數千載之前亦已難矣然二帝三王之治去聲下同本於道二帝三王之道本於心得其心則道與治固可得而言矣何者精一執中堯舜禹相授之心法也建中建極商湯周武相傳之心法也曰德曰仁曰敬曰誠言雖殊而理則一無非所以明此心之妙也至於言天則嚴其心之所自出言民則謹其心之所由施禮樂教化心之發也典章文物心之著也家齊國治而天下平心之推也心之德其盛矣乎二帝三王存此心者也夏桀商受亡此心者也太甲成王困而存此心者也存則治亡則亂治亂之分顧其心之存不存如何耳後世人主有志於二帝三王之治不可不求其道有志於二帝三王之道不可不求其心求心之要舍音捨是書何以哉沈自受讀以來沈潛其義參考衆説融會貫通乃敢折衷音中微辭奧旨多述舊聞二典三謨先生蓋嘗是正手澤尚新嗚呼惜哉先生改本已附文集中其間亦有經承先生口授指畫而未及盡改者今悉更定見本篇集傳去聲本先生所命故凡引用師説不復扶又反識音志别彼列反四代虞夏商周之書分為六卷虞一卷夏一卷商一卷周三卷十書凡百篇遭秦火後今所存者僅五八篇文以時異治以道同聖人之心見音現於書猶化工之妙著於物非精深不能識也是傳去聲也於堯舜禹湯文武周公之心雖未必能造七到反其微於堯舜禹湯文武周公之書因是訓詁果五古纂二切通古今之言也亦可得其指意之大略矣嘉定亦寧宗年號己巳三月既望武夷蔡沈序沈俗作沉非沈音澄洗字仲默建寧府建陽縣人西山先生之仲子從學朱文公隱居不仕自號九峰先生
